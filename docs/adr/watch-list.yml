# Watch-list manifest — scheduled re-open-trigger re-verification (#725).
#
# Each entry is a Microsoft Learn / REST / Graph page whose change would unblock a
# standing §8 watch-list ADR. The watch-list-review loop
# (.github/workflows/watch-list-review.yml) fetches each `url` weekly (read-only,
# public) and flags a MATERIAL change against the recorded baseline, then opens a
# single deduplicated issue routed to @idea-intake. The loop never auto-closes a
# watch-list issue and never ships a reconciler change — a flagged trigger still
# requires a human re-verification (often interactive-tenant) per the cited ADR.
#
# signal types:
#   updated-since : the page is expected HTTP 200 today. Flag when its `updated_at`
#                   date advances past `baseline` (Microsoft touched the page →
#                   re-verify) OR when the status is no longer 200 (moved / retired).
#   appears       : the page is expected HTTP 404 today (the authoring surface does
#                   not exist yet). Flag when it becomes reachable (HTTP 200) — the
#                   surface may have shipped, which is itself a re-open trigger.
#
# `url` records the CURRENT canonical address. Cmdlet pages were migrated from
# /powershell/module/exchange/* to /powershell/module/exchangepowershell/* (the
# loop follows redirects regardless); accepted ADRs are immutable, so the current
# URL lives here, not in the ADR (see #725, same link-rot class as #710).
#
# Baselines captured 2026-06-20. References:
#   https://learn.microsoft.com/en-us/purview/whats-new
#   https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions

