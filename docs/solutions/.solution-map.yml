# Solution-doc freshness map.
#
# Maps each governed Microsoft Purview solution to the reconciler / desired-state code paths that
# implement it and the solution guide under docs/solutions/ that documents it. Consumed by
# .github/workflows/docs-freshness.yml to emit an ADVISORY (non-blocking) warning when a pull
# request changes a solution's code without touching its guide.
#
# Maintenance: when you add a reconciler or a data-plane solution folder, add a row here and a
# matching page under docs/solutions/. The docs-maintenance skill
# (.github/skills/docs-maintenance/SKILL.md) packages the page template and update checklist.
#
# code entries: an exact repo-relative file path, or a folder prefix ending in '/'.

solutions:
  - name: Sensitivity labels
    doc: docs/solutions/information-protection/labels.md
    code:
      - scripts/Deploy-Labels.ps1
