# Scans, scan rulesets, and triggers (desired state).
# Reference: https://learn.microsoft.com/en-us/rest/api/purview/scanningdataplane/scans
# Reference: https://learn.microsoft.com/en-us/rest/api/purview/scanningdataplane/scan-rulesets
# Reference: https://learn.microsoft.com/en-us/rest/api/purview/scanningdataplane/triggers
#
# Notes:
# - Each scan binds to an existing data source by `dataSource` (the source `name`
#   from data-plane/data-sources/data-sources.yaml). The reconciler rejects
#   scans whose dataSource is not currently registered in the tenant.
# - `properties.collection.referenceName` must target an existing collection.
# - Scans referencing custom scanRulesets must declare them under `scanRulesets`
#   first. Custom rulesets live alongside the System rulesets Purview ships with.
# - `trigger.recurrence` defines the default recurring trigger. Omit `trigger`
#   to run the scan on-demand only (this is the current shape for every imported
#   scan -- on-demand operator-launched only).
# - Body imported from the live `contoso.onmicrosoft.com` tenant on 2026-06-14 under
#   v2 §5.5 row 3 (issue #371). The 1 stale Wave 1 `-weekly` placeholder against
#   AzureDataLakeStorage-TestData was dropped during the import.
scanRulesets:
  - name: AzureFiles
    kind: AzureFileService
    properties:
      temporaryResourceFilters:
        - resourceFilterPattern: '(_SUCCESS|_started_\d*|_committed_\d*|_committed_vacuum\d*)$'
          dataSamplingPattern: top
          ingestTemporaryResource: true
          rowCountToSelect: 128
      scanningRule:
        fileExtensions:
          - CSV
          - JSON
          - PSV
          - SSV
          - TSV
          - TXT
          - XML
          - PARQUET
          - AVRO
          - ORC
          - Documents
          - GZ
          - DOC
          - DOCM
          - DOCX
          - DOT
          - ODP
          - ODS
          - ODT
          - PDF
          - POT
          - PPS
          - PPSX
          - PPT
          - PPTM
          - PPTX
          - XLC
          - XLS
          - XLSB
          - XLSM
          - XLSX
          - XLT
        customFileExtensions: null
      collection: null
      description: ""
      excludedSystemClassifications: []
      includedCustomClassificationRuleNames: []

scans:
  - dataSource: AzureBlob-SampleData
    name: Scan-DataLakeModernization
    kind: AzureStorageMsi
    properties:
      scanRulesetType: System
      domain: purview-contoso-lab
      scanRulesetName: AzureStorage
      collection:
        referenceName: jprasm
      connectedVia:
        managedVNetName: ManagedVnet-Purview-EastUS
        integrationRuntimeType: Managed
        referenceName: IntegrationRuntime-AzureSQL-EastUS
        shirSupportKubernetes: false
      scanScopeType: AutoDetect
  - dataSource: AzureDataExplorer-TestData
    name: Scan-TestPub
    kind: AzureDataExplorerMsi
    properties:
      scanRulesetName: AzureDataExplorer
      scanRulesetType: System
