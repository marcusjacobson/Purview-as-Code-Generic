# Microsoft Purview Records Management — file plan + retention labels (Wave 2c.ii)
#
# Authoritative reference for retention labels and file plan properties applied
# to the contoso.onmicrosoft.com tenant by scripts/Deploy-FilePlan.ps1. The default
# state ships empty; subsequent PRs add entries one at a time and re-run the
# reconciler. Treat the first PR that flips `isRecordLabel: true` or
# `regulatory: true` as DESTRUCTIVE — once content is labeled with a record /
# regulatory record label the label cannot be removed or downgraded without
# admin intervention. Mark such PRs with the `destructive` label.
#
# References:
# - Records management overview     : https://learn.microsoft.com/en-us/purview/records-management
# - File plan manager               : https://learn.microsoft.com/en-us/purview/file-plan-manager
# - Get-ComplianceTag               : https://learn.microsoft.com/en-us/powershell/module/exchange/get-compliancetag
# - New-ComplianceTag               : https://learn.microsoft.com/en-us/powershell/module/exchange/new-compliancetag
# - Set-ComplianceTag               : https://learn.microsoft.com/en-us/powershell/module/exchange/set-compliancetag
# - Remove-ComplianceTag            : https://learn.microsoft.com/en-us/powershell/module/exchange/remove-compliancetag
# - FilePlanProperty* (six cmdlets) : https://learn.microsoft.com/en-us/powershell/module/exchange/new-fileplanpropertyauthority
#
# ---------------------------------------------------------------------------
# Schema (full contract in file-plan.schema.json):
#
# filePlanProperties:
#   authorities:    [ { name } ]              -> New/Remove-FilePlanPropertyAuthority
#   categories:     [ { name } ]              -> New/Remove-FilePlanPropertyCategory
#   citations:      [ { name, url?, jurisdiction? } ]
#                                             -> New/Remove-FilePlanPropertyCitation
#   departments:    [ { name } ]              -> New/Remove-FilePlanPropertyDepartment
#   referenceIds:   [ { name } ]              -> New/Remove-FilePlanPropertyReferenceId
#   subCategories:  [ { name, parentCategory } ]
#                                             -> New/Remove-FilePlanPropertySubCategory
#
# retentionLabels:
#   - name:                    (string, required, 1..64)   -> -Name / -Identity
#     description:             (string, optional)          -> -Comment
#     notes:                   (string, optional)          -> -Notes
#     isRecordLabel:           (bool, default false)       -> -IsRecordLabel
#     regulatory:              (bool, default false)       -> -Regulatory
#     retentionDuration:       ('Unlimited' | int >= 1)    -> -RetentionDuration
#     retentionAction:         (Keep | Delete | KeepAndDelete)
#                                                          -> -RetentionAction
#     retentionType:           (ModificationAgeInDays | CreationAgeInDays |
#                               TaggedAgeInDays | EventAgeInDays)
#                                                          -> -RetentionType
#     reviewerEmail:           [ string ] (optional)       -> -ReviewerEmail
#     filePlanProperty:        (optional object — by name)
#       authority:             (string, references filePlanProperties.authorities[*].name)
#       category:              (string, references filePlanProperties.categories[*].name)
#       subCategory:           (string, references filePlanProperties.subCategories[*].name)
#       citation:              (string, references filePlanProperties.citations[*].name)
#       department:            (string, references filePlanProperties.departments[*].name)
#       referenceId:           (string, references filePlanProperties.referenceIds[*].name)
#
# ---------------------------------------------------------------------------
# Behavior notes:
#
# - Property values are referenced by their `name` only; the reconciler
#   resolves names to the tenant objects at apply time.
# - Reconciler order: filePlanProperty* objects are created BEFORE retention
#   labels (so labels can reference them). On `-PruneMissing`, retention
#   labels are removed BEFORE property objects (parent-before-children).
# - subCategories require an existing category (`parentCategory`). The
#   reconciler validates this both at schema time (via referential check in
#   the script) and at apply time.
# - `isRecordLabel: true` and `regulatory: true` are IRREVERSIBLE once any
#   content has been labeled. Treat the first PR that sets either flag as
#   destructive.
# - Event-based retention (`retentionType: EventAgeInDays`) requires a
#   retention event type GUID via the optional `eventType` field; this lab
#   intentionally defers event-based retention until #82 (Wave 2f) ships its
#   event-type bootstrap. Until then, schema rejects `EventAgeInDays`.
#
# Microsoft seed content (see ADR-0035):
#   The Microsoft Purview File Plan Manager experience ships 31 starter
#   property objects into every tenant (3 authorities, 13 categories,
#   5 citations, 10 departments). These cannot be deleted via any
#   documented IPPS surface as of 2026-06-07; ADR-0035 ratifies them as
#   permanent declared orphans. The reconciler skips them via -SkipNames.
#   The table in docs/adr/0035-records-seed-content-immovable.md is now the
#   SOLE source of truth: the operational copy lived in the retired
#   deploy-data-plane.yml `skip_names_records` input default (ADR 0051), and
#   no per-solution workflow owns this surface yet (issue #80). A local run
#   must therefore pass -SkipNames explicitly -- nothing supplies it for you,
#   and -PruneMissing without it yields 31 Failed rows (#582 post-mortem).
#   Empty `[]` lists below remain the desired-state for *lab-authored*
#   property objects; the 31 seeds belong to Microsoft, not to this repo.
#   Authorities  (3): Business, Legal, Regulatory
#   Categories  (13): Accounts payable, Accounts receivable,
#                     Administration, Compliance, Contracting,
#                     Financial statements, Learning and development,
#                     Payroll, Planning, Policies and procedures,
#                     Procurement, Recruiting and hiring,
#                     Research and development
#   Citations    (5): Commodity Exchange Act, Health Insurance Portability
#                     and Accountability Act of 1996, OSHA Injury and
#                     Illness Recordkeeping and Reporting Requirements,
#                     Sarbanes-Oxley Act of 2002, Truth in Lending Act
#   Departments (10): Finance, Human resources, Information technology,
#                     Legal, Marketing, Operations, Procurement, Products,
#                     Sales, Services

filePlanProperties:
  authorities: []
  categories: []
  citations: []
  departments: []
  referenceIds: []
  subCategories: []

retentionLabels: []
