# Microsoft Purview as-Code — Portal role-group membership (desired state)
#
# Desired state for Microsoft Purview / Microsoft 365 portal role-group
# membership in the `contoso.onmicrosoft.com` tenant. These role groups are a
# Microsoft 365 compliance-portal construct (Organization Management,
# Compliance Administrator, eDiscovery Manager, Insider Risk Management,
# Information Protection Admins/Analysts/Investigators/Readers, Records
# Management, Data Loss Prevention Compliance Management, Communication
# Compliance, and others). They are NOT collection-scoped; they are keyed
# by role-group display name.
#
# The reconciler (`scripts/Deploy-PurviewRoleGroups.ps1`, tracked in the
# Wave 0 checklist) consumes this file, compares each listed role group's
# current membership against the desired `members` list, and performs
# Add/Remove/NoChange operations. Role groups not listed in this file are
# left untouched. Default steady state is an empty `roleGroups` list —
# no-op safe on first run.
#
# First-run bootstrap against an existing tenant (REQUIRED):
#   Before the first reconciler `-Apply` run against this file, run:
#       ./scripts/Deploy-PurviewRoleGroups.ps1 -ExportCurrentState
#   That switch populates `roleGroups:` with the live membership of every
#   role group the automation identity can see. Review the resulting diff
#   in a pull request, then merge. Only after that PR lands is it safe to
#   run `-Apply` (or `-Apply -PruneMissing`) — otherwise the reconciler
#   would treat your existing portal-configured permissions as drift and
#   remove them. This first-run contract is mandatory for every
#   `Deploy-*.ps1` per
#   `.github/instructions/powershell.instructions.md`
#   (section: "First-run-against-an-existing-tenant contract").
#
# Decision context and API choice:
#   docs/adr/0009-portal-role-group-api-ship-order.md
#     (supersedes docs/adr/0008-portal-role-group-api.md)
#   docs/adr/0025-role-group-entra-backing-naming.md
#     Every role group declared here gets a dedicated Microsoft Entra
#     security group `sg-purview-<slug>` provisioned by
#     `scripts/Deploy-RoleGroupBackingEntraGroups.ps1`. Every non-empty
#     `members:` binding below references its dedicated `sg-purview-*`
#     OID (Phase 2 of issue #383, landed in issue #385). The shared
#     `Contoso-Purview-Administrators` group is no longer bound to any
#     Purview role group; it remains in the tenant for non-Purview use
#     at the lab owner's discretion.
#
# Learn references (Microsoft, authoritative):
#   https://learn.microsoft.com/en-us/purview/purview-permissions
#   https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/scc-permissions
#   https://learn.microsoft.com/en-us/powershell/exchange/connect-to-scc-powershell
#   https://learn.microsoft.com/en-us/powershell/exchange/app-only-auth-powershell-v2
#   https://learn.microsoft.com/en-us/powershell/module/exchange/add-rolegroupmember
#   https://learn.microsoft.com/en-us/powershell/module/exchange/remove-rolegroupmember
#   https://learn.microsoft.com/en-us/powershell/module/exchange/get-rolegroupmember
#
# Fields per entry:
#   name         (required, string) Exact Microsoft-published role-group
#                display name. Case-sensitive match against the portal and
#                against the `Identity` parameter of Get-RoleGroupMember.
#                Examples: "Organization Management",
#                "Compliance Administrator", "eDiscovery Manager",
#                "Insider Risk Management",
#                "Information Protection Admins".
#   description  (optional, string) Short prose explaining why this entry
#                exists. Not read by the reconciler; for human reviewers.
#   members      (required, list of strings) Entra (Azure AD) **group**
#                object IDs. One group OID per line. User UPNs and
#                individual object IDs are intentionally rejected by the
#                reconciler per `.github/instructions/security.instructions.md`
#                rule #4 (least privilege — assign to groups, not users).
#                Empty list is valid and means "this role group should have
#                zero declarative members"; the reconciler will remove any
#                drift.
#
# Authentication note:
#   The reconciler authenticates via `Connect-IPPSSession` with
#   certificate-based app-only auth. Runtime, invocation shape, and
#   session-reuse rules are mandated in
#   `.github/instructions/powershell.instructions.md`
#   (section: "Runtime: pwsh 7.4+ only, and the Connect-IPPSSession auth
#   constraint"). The automation identity itself is produced by the
#   future `scripts/New-AutomationIdentity.ps1` (Wave 0 #5), which is
#   blocked on §8 Q3 + Q4 ADRs. Until that script and its ADRs land, this
#   YAML remains the default empty list.
#
# Example (commented-out; do not uncomment on main):
#   - name: Organization Management
#     description: Tenant-wide Exchange / S&C break-glass administration.
#     members:
#       - 00000000-0000-0000-0000-000000000000   # Entra group OID for the break-glass Security Admins group
#
#   - name: Compliance Administrator
#     description: Read + configure compliance solutions (DLP, DLM, etc.).
#     members:
#       - 00000000-0000-0000-0000-000000000000   # Entra group OID for the Compliance Admins group
#
#   - name: eDiscovery Manager
#     description: Create + manage eDiscovery cases and holds.
#     members: []

# Default steady state is an empty list.
# Add one or more entries using the shape above, run the reconciler, and
# review the drift report before merging.
