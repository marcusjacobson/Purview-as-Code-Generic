  - name: Default policy for devices
    description: This policy detects the presence of credit card numbers in files on devices when users perform specific activities (such as printing a file). When detected, the activity is only audited (not blocked). Admins will receive an alert, but policy tips won't be displayed to users. You can edit these actions at any time.
    mode: Enable
    priority: 2
    locations:
      endpoint: All
    rules:
      - name: Default Endpoint DLP Policy Rule - Low Volume
        priority: 0
        sensitiveInfoTypes:
          - guid: 50842eb7-edc8-4019-85dd-5a5c1f2bb085
            minCount: 1
            maxCount: 9
            confidenceLevel: High
        blockAccess: false
        enforcePortalAccess: true
        notifyEmailExchangeIncludeAttachment: true
        reportSeverityLevel: Low
        comment: "\"This rule is matched if 1 to 9 credit card numbers are detected in a file when a user performs certain device-related activities. When detected within a 24-hour period, the activity is only audited (not blocked). Admins won't receive alerts.\""
