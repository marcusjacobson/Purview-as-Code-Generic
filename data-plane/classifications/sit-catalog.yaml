# Sensitive Information Type (SIT) catalog for Microsoft Purview / Microsoft 365.
#
# Populated by `scripts/Sync-SITCatalog.ps1 -ExportCurrentState` against the lab
# tenant. The YAML is the desired-state projection of every SIT visible to the
# connected admin -- both Microsoft built-ins (read-only, listed for reference and
# downstream label / DLP / auto-label policies to refer to by name or GUID) and
# tenant-published custom SITs (read-write through this reconciler in a follow-up
# PR).
#
# References (Microsoft Learn):
#   Sensitive information type entity definitions:
#     https://learn.microsoft.com/en-us/purview/sit-sensitive-information-type-entity-definitions
#   Get-DlpSensitiveInformationType:
#     https://learn.microsoft.com/en-us/powershell/module/exchange/get-dlpsensitiveinformationtype
#   Sensitive information types overview:
#     https://learn.microsoft.com/en-us/purview/sit-learn-about-sensitive-information-types
#
# Schema notes:
#   - `name`       Canonical display name from `Get-DlpSensitiveInformationType.Name`.
#   - `id`         Stable GUID from `.Identity` (also `.Id`). DLP / auto-label
#                  / sensitivity-label cmdlets accept either name or GUID; GUID
#                  is preferred for cross-tenant portability of YAML references.
#   - `publisher`  `Microsoft Corporation` for built-ins, the publishing org name
#                  for tenant-custom. Tenant-real publisher GUIDs (when the API
#                  returns one) are redacted to the zero GUID per
#                  `.github/copilot-instructions.md` "Environment and identifier
#                  boundaries" -- ID lookup is by name, the GUID column is not.
#   - `type`       `Default` (built-in), `Custom` (tenant-published), or
#                  `Functional` (Microsoft-managed compound/credential pattern).
#   - `rulePackId` Optional GUID of the rule package that owns this SIT.
#
# GUID classification (per `.github/copilot-instructions.md` augment #8):
#   - `id` and `rulePackId` values for Microsoft built-in SITs are public,
#     universal Microsoft catalog identifiers (identical across every tenant)
#     documented under https://learn.microsoft.com/en-us/purview/sit-defn-* .
#     They are treated as schema/reference GUIDs (same category as Microsoft
#     role-definition GUIDs) and are NOT subject to zero-GUID redaction.
#   - Tenant-real identifiers (publisher org GUIDs for custom SITs, tenant IDs,
#     subscription IDs, object IDs) ARE redacted to the zero GUID.

