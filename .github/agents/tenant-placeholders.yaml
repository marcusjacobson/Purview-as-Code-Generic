# Tenant placeholder manifest — single-source contract for template tailoring
#
# This file is the machine-readable companion to the two operator agents:
#   - .github/agents/operator-kickoff.agent.md (reads `deTemplate` to detect an
#     un-tailored copy and to strip template banners after tailoring).
#   - .github/agents/operator-tenant.agent.md (reads `tokens`, `tenantSurfaces`,
#     and `intentionalSamples` to build the Step 3 plan, apply the Step 5
#     edits in a safe order, and scope the Step 6 residual scan).
#
# Ratified by docs/adr/0046-tenant-placeholder-manifest.md. When this manifest
# and the ADR disagree, the ADR wins and this file must be corrected.
#
# Why this exists: `contoso-lab` is overloaded — it is the owner/workload slug
# (`tags.owner`), it is embedded in the account name (`purview-contoso-lab`),
# the Key Vault (`kv-contoso-lab-01`), and Log Analytics (`log-contoso-lab`),
# and it appears in prose. A naive global find/replace corrupts these. This
# manifest encodes (a) a longest-match-first token order so replacements never
# corrupt each other, (b) the exact set of files that are tenant surfaces
# (must be replaced), and (c) the set of paths that intentionally keep
# Microsoft's fictitious identifiers (`contoso` / `fabrikam` / `adatum`) as
# sample data and must be excluded from the residual scan.
#
# Identifier boundaries this manifest upholds:
#   .github/copilot-instructions.md — "Environment and identifier boundaries".
#   .github/instructions/sample-data.instructions.md — synthetic-data rule.
#
# This file contains ONLY Microsoft-documented fictitious placeholders and
# interview-field references. It never contains a real tenant value.

schemaVersion: 3

# -----------------------------------------------------------------------------
# tokens — ordered longest-match-first. The operator MUST apply replacements in
# this order within any tenant surface so a shorter token can never corrupt a
# longer one (e.g. replacing `contoso` before `purview-contoso-lab` would
# mangle the account name). `replaceWith` names the Step 1 interview field that
# supplies the real value; the operator never writes a literal real value here.
# -----------------------------------------------------------------------------
tokens:
  - id: purviewAccountName
    placeholder: purview-contoso-lab
    order: 1
    replaceWith: purviewAccountName          # Step 1 Q8
    note: >-
      Compound token. Must be replaced before `contoso-lab` and `contoso`.
      Discover-then-confirm per ADR 0048: Step 1a runs read-only discovery
      (scripts/Find-PurviewAccount.ps1, or az account list + per-subscription
      az resource list) and the owner confirms the target before this value is
      written. If the target is unconfirmed (not found in ARM, a PAYG meter, a
      unified-only account, or not yet created), leave the purview-contoso-lab
      placeholder and add an "account unconfirmed — owner action required" note
      — never write a guessed name (docs/adr/0048-purview-account-discovery-gate.md).
      Also the root collection name (data-plane/collections/collections.yaml
      rootCollection), which is intentional sample content — see
      intentionalSamples — so the operator only rewrites it in the tenant
      surfaces listed below, never globally.

  - id: keyVaultName
    placeholder: kv-contoso-lab-01
    order: 2
    replaceWith: keyVaultName                # Step 1 Q9

  - id: logAnalyticsName
    placeholder: log-contoso-lab
    order: 3
    replaceWith: logAnalyticsName            # Step 1 Q10

  - id: tenantDomain
    placeholder: contoso.onmicrosoft.com
    order: 4
    replaceWith: tenantDomain                # Step 1 Q5

  - id: resourceGroupName
    placeholder: rg-purview-lab
    order: 5
    replaceWith: resourceGroupName           # Step 1 Q7

  - id: ownerSlug
    placeholder: contoso-lab
    order: 6
    replaceWith: ownerSlug                   # Step 1 Q6
    note: >-
      The overloaded slug. Only replace occurrences that remain AFTER the
      compound tokens above have been applied (tags.owner, tenant tag,
      naming examples). Never touch the hyphenless `contosolab` variant in
      data-plane sample resource names — that is intentional sample data.

  - id: githubRepo
    placeholder: Purview-as-Code-Generic
    order: 7
    replaceWith: githubRepo                  # Step 1 Q4

  - id: githubOrg
    placeholder: contoso
    order: 8
    replaceWith: githubOrg                   # Step 1 Q3
    note: >-
      The bare org token. Highest corruption risk — it is a substring of every
      token above and is ALSO Microsoft's documented fictitious org name kept
      throughout the intentional-sample paths. Apply it LAST, and ONLY inside
      the tenant surfaces listed below (githubOrg field, README title/target
      line, CODEOWNERS, the getting-started OIDC subject org segment). Never
      run a repository-wide replace of `contoso`.

  - id: codeownersHandle
    placeholder: "@OWNER-PLACEHOLDER"
    order: 9
    replaceWith: codeownersHandle            # Step 1 Q13

# -----------------------------------------------------------------------------
# tenantSurfaces — the authoritative Step 5 edit list. Every file here MUST have
# its placeholders replaced for the copy to deploy against a real tenant. Each
# entry documents which tokens apply and, for MIXED files, which block to edit
# (so the operator never blind-replaces a file that also holds sample data).
# -----------------------------------------------------------------------------
tenantSurfaces:
  # --- Control plane -----------------------------------------------------------
  - path: infra/parameters/lab.yaml
    tokens: [purviewAccountName, keyVaultName, logAnalyticsName, tenantDomain, resourceGroupName, ownerSlug, githubRepo, githubOrg]
    note: >-
      Single source of truth. Also set environment, location, the OIDC app
      displayNames, and the content-explorer wrapper-group displayName/zero-GUID
      from Step 1. The TEMPLATE header comment block is stripped in deTemplate.

  - path: infra/main.bicepparam
    tokens: [purviewAccountName, tenantDomain, keyVaultName, ownerSlug]
    note: purviewAccountName, location, keyVaultName, tags.owner, tags.tenant, and the header comment.

  - path: infra/parameters/README.md
    tokens: [purviewAccountName, keyVaultName, logAnalyticsName, ownerSlug, resourceGroupName]
    note: >-
      Doc that mirrors lab.yaml's example resource names (contoso-lab,
      log-contoso-lab, kv-contoso-lab-01). Update so the doc matches the
      tailored values. Low-risk (documentation), but listed so the residual
      scan reaches zero.

  - path: infra/main.bicep
    tokens: [ownerSlug]
    note: >-
      The `owner: 'contoso-lab'` default tag (currently ~line 39) and the
      header comment. Missed by the pre-manifest Step 5 list.

  - path: infra/modules/law.bicep
    tokens: [ownerSlug, logAnalyticsName]
    note: >-
      The `owner: 'contoso-lab'` default tag and the naming @description that
      cites `log-contoso-lab`. Module tag defaults are tenant surfaces until
      lab.yaml drives them (see lab.yaml `tags` comment). Missed pre-manifest.

  - path: infra/modules/keyvault.bicep
    tokens: [ownerSlug, keyVaultName]
    note: >-
      The `owner: 'contoso-lab'` default tag and the naming @description that
      cites `kv-contoso-lab-01`. Missed pre-manifest.

  - path: infra/main.json
    tokens: [ownerSlug]
    regenerate: true
    note: >-
      Compiled ARM artifact — do NOT hand-edit. It is regenerated by
      `az bicep build --file infra/main.bicep` (the Step 6 validation gate).
      After editing the .bicep surfaces above, rebuild it so its baked-in
      `owner` tag matches. Deploy uses main.bicep, not main.json.

  # --- Meta / identity boundary ------------------------------------------------
  - path: .github/copilot-instructions.md
    tokens: [purviewAccountName, tenantDomain, resourceGroupName, ownerSlug, githubOrg]
    block: "Environment and identifier boundaries; and the Squad hard-rules lab-owner-identity line"
    mixed: true
    note: >-
      Replace ONLY (a) the env-boundary values in the "Environment and
      identifier boundaries" section (account name, tenant domain, resource
      group, region, env name) and (b) the bare `contoso` in the Squad
      hard-rules bullet ("applied by the lab owner identity `contoso`") with the
      owner's githubOrg. That bullet is OUTSIDE the env-boundary block, so the
      residual scan caught it — Step 5 must own it (ADR 0046). The
      identifier-placeholder TABLE in the same file intentionally keeps
      `contoso` / `fabrikam` / `adatum` / zero-GUID as the documented
      convention — never rewrite those.

  - path: README.md
    tokens: [purviewAccountName, tenantDomain, githubOrg]
    mixed: true
    note: >-
      Replace the title and the "Target account (placeholder)" line. The
      tenant-neutral banner and the "Template repository" note are stripped in
      deTemplate, not value-replaced.

  - path: .github/CODEOWNERS
    tokens: [codeownersHandle, ownerSlug]
    note: >-
      Replace every `@OWNER-PLACEHOLDER` in the ownership rules
      (codeownersHandle) AND the `(contoso-lab)` slug in the line-1 header
      comment `# CODEOWNERS for Purview-as-Code (contoso-lab)` (ownerSlug). The
      header slug was missed by the pre-manifest edit list — the residual scan
      caught it, so Step 5 must own it (ADR 0046). The repo name `Purview-as-Code`
      in the header is not a tenant token; leave it.

  - path: .github/instructions/naming.instructions.md
    tokens: [ownerSlug, purviewAccountName, keyVaultName, logAnalyticsName]
    block: "the <workload> prefix and the example table"
    mixed: true
    note: >-
      Replace the worked examples that use the contoso-lab resource names.
      Prose that documents `contoso` as the fictitious-org convention stays.

  - path: docs/getting-started.md
    tokens: [githubOrg, githubRepo, tenantDomain]
    block: "the OIDC federated-credential subject and az commands"
    mixed: true
    note: >-
      Replace the org/repo in the federated-credential subject and the account
      name in the deploy examples. Keep the per-plane app model and the
      :environment:<env> subject shape (ADR 0010).

  - path: .github/workflows/**
    tokens: [keyVaultName, tenantDomain]
    functionalOnly: true
    note: >-
      RETIRED AS AN EDIT SURFACE (ADR 0057): workflows no longer carry ANY
      functional tenant literal. The former literals moved to the selected
      GitHub Environment's variables — `KEY_VAULT_NAME`, `TENANT_DOMAIN`,
      `DATA_PLANE_CERT_NAME`, `PURVIEW_RG`, `PURVIEW_ACCOUNT_NAME` — which the
      operator sets in Settings -> Environments (see docs/getting-started.md
      section 2), so there is nothing to replace in these files during
      tailoring. The owner-login gate in idea-intake-autoadd.yml likewise
      reads the `OWNER_APPROVAL_LOGIN` repository variable. Every remaining
      `contoso` in workflows is COSMETIC (issue-body prose, doc-link URLs,
      `--title` strings); updating those is optional and not deploy-breaking,
      so the broad residual scan still excludes .github/workflows. The entry
      stays, with the targeted `functionalWorkflowScan` below, as the
      VERIFICATION guard that this remains true: the scan must find zero
      matches even pre-tailoring, and any match is a regression against
      ADR 0057 (also pinned by tests/workflows/EnvironmentRouting.Tests.ps1).

  # --- Optional (owner opt-in) -------------------------------------------------
  - path: .squad/team.md
    tokens: [ownerSlug]
    optional: true
    note: >-
      Only if the owner wants the "(contoso-lab)" persona identity string
      renamed. .squad/memory/** is Scribe-owned — never edit it here
      (.github/instructions/squad-memory.instructions.md).

# -----------------------------------------------------------------------------
# intentionalSamples — git pathspecs that legitimately retain Microsoft's
# fictitious identifiers as sample/example/convention content. The Step 6
# residual scan EXCLUDES these so a leftover match anywhere else is a genuine
# missed tenant surface, not sample-data noise. Expressed as git pathspecs for
# `git grep -- <pathspec>` (":!" = exclude).
#
# SCOPE OF THIS LIST — read before adding to it (ADR 0055):
#   These excludes apply to the TOKEN-shaped `residualScan` ONLY. They do NOT
#   apply to the `identifierScan` below, which has NO path excludes at all, by
#   design. A path exclusion is what hid the ADR 0055 disclosure: the entry
#   `:!data-plane` was written for sample *catalog content* and silently also
#   excluded the two live desired-state files that carried real Entra group
#   object IDs. Never add a directory-level exclude here on the assumption that
#   it also protects the identifier surface — it does not, and the identifier
#   surface is the one that leaks.
# -----------------------------------------------------------------------------
intentionalSamples:
  - ":!docs/adr"                 # decision records quote the placeholders verbatim
  - ":!CHANGELOG.md"             # historical entries reference the placeholders
  # --- data-plane: the four "sample" excludes are GONE (ADR 0056) --------------
  # ADR 0055 narrowed a blanket ":!data-plane" down to four files, on the claim that
  # those four were sample content. THEY WERE NOT. They were the four carrying the
  # owner's live lab config — a real Databricks workspace, a real Dataverse org, a real
  # Entra group named as a label rights holder, and Purview's auto-generated collection
  # IDs. The exclusions were the assertion "these are samples", and the assertion was
  # false; they are removed rather than re-scoped.
  #
  # ADR 0056 removes the need for them at the root: data-plane/** now ships EMPTY root
  # lists, so there is no sample content left in the tree to exclude. The scrubbed worked
  # examples live under examples/**, which is deliberately NOT excluded here either — a
  # path exclusion is the mechanism that hid the last disclosure, and relocating content
  # behind one would just move the blind spot. examples/** stays in BOTH scans.
  #
  # The remaining header-comment matches across data-plane/** ("...the
  # `contoso.onmicrosoft.com` tenant") are real stale-after-tailoring prose and the
  # operator SHOULD confirm them.
  - ":!data-plane/**/*.schema.json"                        # JSON-Schema `$id` namespace URIs (purview-as-code.contoso-lab/...) — not tenant surfaces
  - ":!tests"                    # Pester fixtures assert against synthetic identifiers
  - ":!docs/runbooks"            # illustrative end-to-end examples
  - ":!docs/solutions"           # solution guides use synthetic examples
  - ":!docs/governance"          # governance docs use synthetic examples
  - ":!docs/architecture.md"
  - ":!docs/scripts-reference.md"
  - ":!docs/tenant-onboarding.md"  # template onboarding guide stays generic (<your-org>/<your-repo>)
  - ":!docs/kickoff-guide.md"     # template kickoff guide stays generic
  - ":!.github/instructions"     # rule docs document `contoso` as the convention
  - ":!.github/prompts"          # prompt templates use synthetic examples; functional deploy values (account/RG/region/tenant-domain) are read from infra/parameters/lab.yaml at runtime, not embedded (ADR 0046)
  - ":!.github/skills"           # skill docs document the placeholder convention
  - ":!.github/copilot-automations"
  - ":!.github/agents"           # agent bodies use `contoso` as example (persona rename is opt-in)
  - ":!.squad"                   # persona identity + Scribe-owned memory
  - ":!index.html"               # generated landing page
  - ":!scripts"                  # .EXAMPLE blocks, .PARAMETER text, and the RedactedIdentityPattern legitimately use contoso/fabrikam/adatum (sample-data.instructions.md); scripts read tenant values from lab.yaml at runtime, not hardcoded
  - ":!.github/workflows"        # dominated by cosmetic prose/doc-links; the FEW functional values are verified by functionalWorkflowScan below, not this broad scan

# -----------------------------------------------------------------------------
# residualScan — the broad Step 6 scan the operator runs (see
# operator-tenant.agent.md). The `pattern` is the search regex; the exclude
# pathspecs are the `intentionalSamples` list above. The generator script
# scripts/Get-TenantResidualScanCommand.ps1 assembles the ready-to-run
# `git --no-pager grep` command from this block + intentionalSamples so the
# agent body never hand-copies the list (drift guard, ADR 0046).
#
# Any remaining match after the exclusions is a tenant surface that was missed
# or a value the owner deliberately kept — the operator lists each for the owner
# to confirm, one line at a time. MIXED tenant surfaces (copilot-instructions.md,
# README.md, getting-started.md; and naming.instructions.md, which lives under the
# excluded .github/instructions) legitimately keep the `contoso`/`fabrikam`/`adatum`
# CONVENTION prose after tailoring — they are edited per the explicit tenantSurfaces
# list, and their remaining matches are expected convention text, not misses.
# -----------------------------------------------------------------------------
residualScan:
  pattern: 'contoso|onmicrosoft\.com|OWNER-PLACEHOLDER'
  # excludePathspecs = the intentionalSamples list above (single source).
  #
  # LIMIT OF THIS SCAN (ADR 0055): this pattern is TOKEN-shaped. It can only
  # find values that genericization *substituted* — literal strings. It cannot
  # find identifier-shaped data (raw GUIDs), because a GUID contains none of
  # these tokens. It is NOT, and never was, a check that the repo is free of
  # real tenant identifiers. `identifierScan` below is that check.

# -----------------------------------------------------------------------------
# identifierScan — the IDENTIFIER-shaped pass (ADR 0055; amends ADR 0046).
#
# WHY THIS EXISTS. ADR 0046 claimed: "Scanning everything except these paths
# means any remaining match is a genuine missed tenant surface." That claim was
# unsound. A token-shaped scan cannot verify the ABSENCE of identifier-shaped
# data. Real Entra group object IDs sat in ACTIVE desired-state lists in this
# public template repo and `residualScan` could not see them for two independent
# reasons, either of which alone was fatal:
#   1. `intentionalSamples` blanket-excluded the whole `data-plane/` tree — the
#      exact directory the desired state lives in. (Narrowed above.)
#   2. `residualScan.pattern` is token-shaped. Even with the exclusion removed,
#      `contoso|onmicrosoft\.com|OWNER-PLACEHOLDER` matches no GUID.
#
# DESIGN — the allow-list, not the regex, is the hard part. There are 384
# distinct non-zero GUIDs in this repo and almost all are legitimate,
# tenant-INDEPENDENT Microsoft constants. A scan that cries wolf 384 times gets
# disabled, which is worse than no scan. So a non-zero GUID is allowed ONLY if
# one of the four rules below claims it. EVERYTHING ELSE FAILS — including a
# GUID in a file nobody has looked at, under a key nobody has enumerated. That
# fail-closed property is the whole point: a scan that only knows the places we
# already looked would have missed this leak too.
#
# NOTE: there are deliberately NO path excludes here. Not for `tests/`, not for
# `docs/`, not for `data-plane/`. A path exclusion is what caused the leak.
# -----------------------------------------------------------------------------
identifierScan:
  # The shape being hunted. Anything matching this is guilty until a rule
  # below acquits it.
  guidPattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'

  # --- Rule 1 — SYNTHETIC SHAPES ------------------------------------------------
  # Acquits by SHAPE, so it cannot be satisfied by a real identifier: every
  # pattern here describes a GUID that is structurally impossible to mistake for
  # one Entra or Azure would mint. This is what replaces a `:!tests` path
  # exclusion — fixtures are acquitted for LOOKING synthetic, not for LIVING in
  # tests/. A real OID pasted into tests/ still fails.
  syntheticShapes:
    - id: zero-guid
      pattern: '^00000000-0000-0000-0000-000000000000$'
      note: The sanctioned placeholder (copilot-instructions.md, "Environment and identifier boundaries").
    - id: reserved-synthetic-namespace
      pattern: '^00000000-0000-0000-0000-[0-9a-f]{12}$'
      note: >-
        Zero-prefixed fixture namespace — the zero GUID with a counter in the
        node field (...0001, ...0010, ...). Already the de-facto convention in
        tests/; ratified by ADR 0055. New fixtures MUST use this namespace.
    - id: repeated-nibble
      pattern: '^([0-9a-f])\1{7}-\1{4}-\1{4}-\1{4}-\1{12}$'
      note: All-same-hex-digit fixtures (11111111-..., aaaaaaaa-..., ffffffff-...).
    - id: documented-synthetic-literal
      pattern: '^(deadbeef-dead-beef-dead-beefdeadbeef|abcdef01-1234-5678-9abc-def012345678)$'
      note: Two named, obviously-synthetic literals used by the identifier-formatting tests.

  # --- Rule 2 — CATALOG KEYS ----------------------------------------------------
  # Acquits by (file, key). A GUID is a Microsoft catalog identifier if it
  # appears as the value of one of these keys IN one of these files. The
  # resulting VALUE SET is then allowed to be cited anywhere in the repo (docs
  # prose, ADRs, script defaults, test fixtures) — once a GUID is established as
  # a Microsoft-published catalog constant it is public, and re-listing it in
  # five places would be noise.
  #
  # WHY KEYS, NOT VALUES: sit-catalog.yaml alone holds 333 built-in SIT and
  # rule-pack IDs. Enumerating them by value would make every SIT-catalog
  # refresh an allow-list PR, which trains reviewers to rubber-stamp allow-list
  # additions — and a reviewer in the habit of rubber-stamping allow-list
  # additions is exactly how a real OID gets waved through. Four reviewable
  # (file, key) pairs are safer than a 333-line value list nobody reads.
  #
  # WHY THIS IS STILL FAIL-CLOSED: the match is anchored to `<key>: <guid>` as
  # the WHOLE value. The disclosure was a bare YAML sequence item under
  # `members:` — `- <guid>  # sg-...` — which carries no key and therefore
  # cannot be acquitted by this rule, in any file. Per ADR 0023 a principal is
  # named by `displayName`, never by a raw object ID, so no legitimate key ever
  # carries one.
  catalogKeys:
    - path: data-plane/classifications/sit-catalog.yaml
      keys: [id, rulePackId]
      note: >-
        Microsoft built-in Sensitive Information Type IDs and their owning
        rule-pack IDs. Identical in every tenant; documented at
        https://learn.microsoft.com/en-us/purview/sit-sensitive-information-type-entity-definitions
        This file is machine-generated by scripts/Sync-SITCatalog.ps1
        -ExportCurrentState from the SIT API, which cannot return a group OID.
    - path: data-plane/dlp/policies.yaml
      keys: [guid]
      note: >-
        Built-in SIT + trainable-classifier IDs referenced by DLP rules. Ships an EMPTY
        root list per ADR 0056, so it currently contributes NOTHING to the value set. The
        entry stays because a spin-off that populates its own DLP policies will reference
        the same Microsoft built-in IDs and must not have to re-litigate this rule.
    - path: data-plane/information-protection/auto-label-policies.yaml
      keys: [sitId]
      note: >-
        Built-in SIT IDs referenced by auto-labeling rules. Ships an EMPTY root list per
        ADR 0056; same reasoning as dlp/policies.yaml above.
    - path: data-plane/information-protection/labels.autoApplicationOf.fixture.yaml
      keys: [sitId]
      note: Built-in SIT IDs in the label auto-application fixture (ADR 0017).
    # --- examples/** (ADR 0056) ---------------------------------------------------
    # The worked examples moved OUT of data-plane/** and into examples/**, a tree no
    # workflow, script, or schema reads. They carry the same Microsoft built-in SIT and
    # trainable-classifier IDs, under the same keys, and they are NOT excluded from this
    # scan — examples/** is scanned like everything else, because a path exclusion is
    # what hid the last disclosure. So the (file, key) rule must follow the content.
    #
    # This is the SAME rule, not a new escape hatch: still anchored to `<key>: <guid>` as
    # the whole value, so a bare sequence item under `members:` is still unacquittable in
    # these files, and every non-SIT GUID in examples/** still fails closed.
    - path: examples/data-plane/dlp/policies.yaml
      keys: [guid]
      note: >-
        Built-in SIT + trainable-classifier IDs in the worked DLP example (ADR 0056).
        Microsoft-published, identical in every tenant.
        https://learn.microsoft.com/en-us/purview/sit-sensitive-information-type-entity-definitions
    - path: examples/data-plane/information-protection/auto-label-policies.yaml
      keys: [sitId]
      note: >-
        Built-in SIT IDs in the worked auto-labeling example (ADR 0056). The enforcing
        Lab-AutoLabel-SSN policy is DELETED, not relocated; only the simulation-mode
        credit-card example survives.

  # --- Rule 3 — MICROSOFT CONSTANTS ---------------------------------------------
  # Acquits by exact VALUE. For the GUIDs that have no enclosing key to hang a
  # rule on — Bicep `var` declarations, PowerShell string literals, prose in a
  # comment. These are Microsoft-published and tenant-independent: the same GUID
  # in every tenant on Earth. The list is short, every entry is named, and every
  # entry is citable — which is precisely why enumerating THESE by value is
  # sound while enumerating 333 SIT IDs by value is not.
  microsoftConstants:
    # Entra built-in directory-role template IDs.
    # https://learn.microsoft.com/en-us/entra/identity/role-based-access-control/permissions-reference
    - value: 17315797-102d-40b4-93e0-432062caca18
      name: Compliance Administrator (Entra directory role template)
    - value: e6d1a23a-da11-4be4-9570-befc86d067a7
      name: Compliance Data Administrator (Entra directory role template)
    - value: 7495fdc4-34c4-4d15-a289-98788ce399fd
      name: Information Protection Administrator (Entra directory role template)
    # Azure RBAC built-in role definition IDs.
    # https://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles
    - value: b24988ac-6180-42a0-ab88-20f7382dd24c
      name: Contributor (Azure RBAC built-in role)
    - value: 12338af0-0e69-4776-bea7-57ae8d297424
      name: Key Vault Crypto User (Azure RBAC built-in role)
    - value: f25e0fa2-a7c8-4377-a976-54943a77a395
      name: Key Vault Contributor (Azure RBAC built-in role)
    - value: db79e9a7-68ee-4b58-9aeb-b90e7c24fcba
      name: Key Vault Certificate User (Azure RBAC built-in role)
    - value: a4417e6f-fecd-4de8-b567-7b0420556985
      name: Key Vault Certificates Officer (Azure RBAC built-in role)
    # Microsoft first-party application / app-role IDs.
    # https://learn.microsoft.com/en-us/troubleshoot/entra/entra-id/governance/verify-first-party-apps-sign-in
    - value: 00000002-0000-0ff1-ce00-000000000000
      name: Office 365 Exchange Online (Microsoft first-party application ID)
    # https://learn.microsoft.com/en-us/powershell/exchange/app-only-auth-powershell-v2
    - value: dc50a0fb-09a3-484d-be87-e023b12c6440
      name: Exchange.ManageAsApp (application permission / app-role ID)

  # --- Rule 4 — REVIEW REQUIRED (quarantine) ------------------------------------
  # Identifiers of UNRESOLVED provenance. Reported as `Review` rows (loud
  # warnings, CI annotations) rather than `Finding` rows, so the scan can go
  # green on a repo that is not yet perfectly clean WITHOUT laundering an
  # unknown identifier into "Microsoft constant" — which would be the exact
  # rubber-stamp failure this design exists to prevent.
  #
  # Entries are keyed by SHA-256 of the lower-cased GUID, NOT by value: the
  # manifest deliberately does not restate an identifier whose provenance is in
  # doubt. Compute with:
  #   $s=[IO.MemoryStream]::new([Text.Encoding]::UTF8.GetBytes('<guid>'.ToLower()))
  #   (Get-FileHash -InputStream $s -Algorithm SHA256).Hash.ToLower()
  #
  # THIS LIST IS PINNED BY A PESTER TEST. It cannot grow without also editing
  # tests/scripts/Test-IdentifierResidue.Tests.ps1 — a deliberate, visible
  # review signal. It is a quarantine, not an escape hatch.
  reviewRequired:
    - sha256: 6bb5e87d3144d4e6dac9e6d5dfc4b47999cb63df062eef342567ccaddf8e5068
      location: docs/adr/0035-records-seed-content-immovable.md
      ownerDecision: >-
        Verify whether Microsoft provisions the same seed File Plan property
        GUID in every tenant. If yes → promote to microsoftConstants with a
        Learn citation. If no → redact in ADR 0035 (an owner call: ADRs are
        immutable, docs/adr/README.md line 5).
      note: >-
        File Plan property `Guid`, pasted verbatim from an interactive
        `Get-FilePlanPropertyDepartment` probe against the owner's live tenant.
        ADR 0035 argues the seed properties are Microsoft-managed (and therefore
        that this is a Microsoft constant), but that is an inference, not a
        verified fact. LOW severity — a records-management property GUID
        discloses no admin topology. Deliberately NOT filed under
        microsoftConstants: that would launder "we don't know" into "Microsoft
        says so", which is the failure mode ADR 0055 exists to prevent.
    - sha256: 53fc1662c3b2d2b3c056cf9e9513b8ef5da860141b468fb8d547a23a1dab41a8
      location: docs/adr/0035-records-seed-content-immovable.md
      ownerDecision: >-
        Same decision as the entry above; both GUIDs came from the same probe
        and resolve together.
      note: >-
        File Plan property `Policy` GUID from the same probe. ADR 0035 line 61
        asserts it "identifies a Microsoft-managed policy scope" — same
        unverified inference. Same severity, same owner decision.

# -----------------------------------------------------------------------------
# functionalWorkflowScan — regression guard over .github/workflows (excluded
# from the broad residualScan above because cosmetic prose dominates). Since
# ADR 0057 moved every functional tenant value into GitHub Environment
# variables, workflows carry NO functional literal at all: this scan must find
# zero matches even PRE-tailoring, and any match is a regression (a deploy
# would target the wrong Key Vault / tenant). The generator script emits this
# as a targeted `git --no-pager grep` over the `pathspec`. The owner-login
# gate is NOT in this pattern — idea-intake-autoadd.yml reads the
# OWNER_APPROVAL_LOGIN repository variable, so there is no literal to scan for.
# -----------------------------------------------------------------------------
functionalWorkflowScan:
  pattern: 'KEY_VAULT_NAME:.*contoso|TENANT_DOMAIN:.*contoso'
  pathspec: '.github/workflows/'

# -----------------------------------------------------------------------------
# deTemplate — literal banner/comment blocks that become misleading on a
# tailored repo. The operator strips these in Step 5 (after value replacement),
# and operator-kickoff uses their PRESENCE to confirm a copy is still an
# un-tailored template.
# -----------------------------------------------------------------------------
deTemplate:
  - path: README.md
    marker: "This is a tenant-neutral template"
    action: >-
      Remove the tenant-neutral banner blockquote and the "Template
      repository. This repo is enabled as a GitHub template" note once the
      copy is tailored. Keep the Quick start steps.
  - path: infra/parameters/lab.yaml
    marker: "TEMPLATE — replace the placeholder values below"
    action: >-
      Remove the "TEMPLATE — replace the placeholder values below" header
      comment block (the fenced Values-to-replace list) after the values are
      written. Keep the design-rationale header above it.
