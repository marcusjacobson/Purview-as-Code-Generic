name: Idea Intake — Auto-add needs-review

# Gated to the lab owner: `needs-review` signals owner-readiness for merge
# and must not be auto-applied to issues filed by outside contributors.
# See https://docs.github.com/en/actions/reference/contexts#github-context

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label-new-issue:
    runs-on: ubuntu-latest
    if: github.event.issue.user.login == 'contoso'
    steps:
      - name: Ensure needs-review label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "needs-review" \
            --color "fbca04" \
            --description "Awaiting lab-owner review before merge" \
            --repo "${{ github.repository }}" \
          || true

      - name: Apply needs-review label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ github.event.issue.number }}" \
            --add-label "needs-review" \
            --repo "${{ github.repository }}"
