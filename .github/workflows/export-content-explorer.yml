name: export-content-explorer

# Wave 3a Phase 2 / Issue #74 — weekly Microsoft Purview Content Explorer
# export workflow. Read-only: invokes Get-ContentExplorerData across the
# (label x SIT) x workload scope declared in data-plane/dspm/dspm-config.yaml
# and uploads the per-pair JSON + manifest as a GitHub Actions artifact.
# Cadence + retention + scope are governed by ADR 0021.
#
# Reference: docs/adr/0021-dspm-content-explorer-cadence.md
# Reference: https://learn.microsoft.com/en-us/purview/data-classification-content-explorer
# Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/get-contentexplorerdata
# Reference: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect
# Reference: https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#context-availability
#
# Skip gate (ADR 0054): this schedule-triggered workflow fires on every
# un-onboarded template copy, including this repository itself, and
# unconditionally assumed a real Purview tenant was wired up. The
# `preflight` job below tests the onboarding signal (a non-empty
# secrets.AZURE_CLIENT_ID on the selected GitHub Environment) from
# inside a running job -- `secrets` is not available in ANY `if:`
# condition, only in env/run/with -- and emits a `configured` output.
# This workflow never opens the Key Vault firewall (Export-
# ContentExplorerData.ps1 resolves its Key Vault name from the
# parameters file, not from vars.KEY_VAULT_NAME), so the gate checks
# only AZURE_CLIENT_ID, not KEY_VAULT_NAME. The `export` job below
# declares `needs: preflight` and `if:
# needs.preflight.outputs.configured == 'true'` (`needs` IS available
# in a job-level `if:`), so an un-onboarded copy SKIPS this job cleanly
# instead of failing at azure/login.

on:
  # ADR 0021 Decision 1 — weekly Monday 07:00 UTC. workflow_dispatch is
  # retained for ad-hoc evidence runs during incident response and for
  # smoke tests after upstream label / SIT changes.
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      environment:
        description: >-
          Target deployment environment (GitHub Environment name).
          Defaults to lab. Push/schedule runs map branch dev -> dev and
          every other branch -> lab (ADR 0057).
        type: choice
        options:
          - lab
          - dev
        default: lab
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  preflight:
    name: Preflight (ADR 0054 onboarding signal)
    runs-on: ubuntu-latest
    # Binds the SAME selected environment as export below (ADR 0057
    # canonical expression, byte-identical), so the secret it tests is the
    # exact one export would use.
    environment: ${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
    permissions:
      contents: read
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    env:
      # secrets/vars are legal in jobs.<job_id>.env (not in jobs.<job_id>.if
      # or jobs.<job_id>.steps.if) -- see ADR 0054.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - name: Check onboarding signal
        id: check
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:AZURE_CLIENT_ID)) {
            Write-Host "::notice::secrets.AZURE_CLIENT_ID is not set on this GitHub Environment. This copy is not onboarded to a Purview tenant (ADR 0054) -- skipping the tenant-touching job."
            Add-Content -Path $env:GITHUB_OUTPUT -Value "configured=false"
          } else {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "configured=true"
          }

  export:
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
      # Reconciler parameters-file override (ADR 0057).
      PURVIEW_PARAMETERS_FILE: infra/parameters/${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}.yaml
    # Slightly larger than the per-solution deploy-*.yml defaults because the
    # exporter paginates per (item, workload) pair with a 1-second
    # throttle between calls (ADR 0021 Decision 7).
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # Reference: https://github.com/Azure/login
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install powershell-yaml
        shell: pwsh
        run: Install-Module powershell-yaml -Force -Scope CurrentUser

      # Connect-IPPSSession is shipped in ExchangeOnlineManagement; the
      # exporter calls it with -AccessToken (PS256 JWT from
      # Get-PurviewIPPSAccessToken.ps1) so a stored secret is never needed.
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchangepowershell/connect-ippssession
      - name: Install ExchangeOnlineManagement
        shell: pwsh
        run: Install-Module ExchangeOnlineManagement -Force -Scope CurrentUser

      - name: Export Content Explorer
        shell: pwsh
        run: ./scripts/Export-ContentExplorerData.ps1

      # ADR 0021 Decision 5 — 90-day artifact retention. The exporter
      # writes a timestamped subdirectory under verify-dspm-export-output/;
      # upload the whole tree so reviewers see every (item, workload) pair
      # plus the manifest.json index.
      # Reference: https://github.com/actions/upload-artifact
      - name: Upload export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-explorer-${{ github.run_id }}
          path: verify-dspm-export-output/**
          retention-days: 90
          if-no-files-found: error
