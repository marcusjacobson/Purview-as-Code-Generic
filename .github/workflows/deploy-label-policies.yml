name: deploy-label-policies

# Reconciles the Microsoft Purview / Microsoft 365 sensitivity-label POLICIES
# in the target tenant (selected environment) from
# data-plane/information-protection/label-policies.yaml.
#
# Sibling of deploy-labels.yml (PR #144 / PR #460). Where deploy-labels.yml
# owns the label TAXONOMY, this workflow owns the BINDING of those labels
# to end-user locations via *-LabelPolicy cmdlets.
#
# Implements the ADR 0029 source-of-truth direction-policy contract:
# every dispatch chooses one of three modes, default portal-wins. Mode
# effects are arbitrated inside scripts/Deploy-LabelPolicies.ps1 via its
# -DirectionPolicy / -SkipNames parameters (Phase 1 / PR #468); this
# workflow's job is to (1) gate destructive modes behind typed
# confirmation, (2) compute the deterministic skip list for portal-wins
# via a first read-only pass, and (3) auto-open a drift-back PR when
# portal-wins skipped any policy.
#
# Modes (see docs/adr/0029-source-of-truth-direction-policy.md and
# docs/runbooks/labels-direction-policy.md):
#
#   audit       -- read-only. No New-/Set-/Remove-LabelPolicy calls under
#                  any condition. Single script invocation with
#                  -DirectionPolicy audit. Produces the plan table for
#                  compliance evidence and exits.
#
#   portal-wins -- default. Two-pass:
#                    1) Enumerate pass. Runs Deploy-LabelPolicies.ps1
#                       with -DirectionPolicy portal-wins -WhatIf, parses
#                       [ADR0029-SKIP] markers from the run log to build
#                       a deterministic skip list. No writes fire
#                       (-WhatIf gates ShouldProcess in Phase 3).
#                    2) Apply pass. Re-invokes the script with the
#                       parsed skip list as -SkipNames so the second
#                       call's skip decisions match the first call's
#                       exactly, even if tenant state moved between
#                       calls. Creates policies, applies non-conflicting
#                       updates, skips shared-property drift.
#                  If any policy was skipped, re-exports the tenant
#                  state and a follow-up job opens / refreshes a
#                  drift-back PR listing the skipped policies.
#
#   repo-wins   -- DESTRUCTIVE. Overwrites tenant fields with YAML values
#                  for every shared-policy drift. Two-pass:
#                    1) Audit pass for symmetry / plan visibility
#                       (read-only, same shape as audit mode).
#                    2) Apply pass with -DirectionPolicy repo-wins. Each
#                       overwrite emits a Write-Warning line naming the
#                       policy and the drifted field set.
#                  Requires confirm_overwrite='overwrite portal'
#                  (case-sensitive). The pre-flight gate fails the job
#                  before Key Vault unlock or Azure login if the token
#                  is missing or mistyped.
#
# A final Verify-Published step calls Deploy-LabelPolicies.ps1
# -VerifyPublished against the freshly applied tenant. The script reads
# Get-LabelPolicy.Status directly and asserts every desired policy with
# mode: Enable has reached Status: Published; any Fail or Missing row
# throws. This implements the #66 exit criterion with a stronger signal
# than the previous -WhatIf == NoChange idempotency check. Skipped under
# audit mode (no apply happened) and tolerated under portal-wins skips
# (the skipped policy may legitimately not be Published yet).
#
# Job split (least-privilege, per
# .github/instructions/github-actions.instructions.md "Direction-policy
# contract (ADR 0029)):
#   apply           : id-token: write + contents: read. Holds the Azure
#                     OIDC + IPPS surface. Cannot open PRs.
#   drift-back-pr   : contents: write + pull-requests: write. Holds no
#                     Azure surface. Runs only when apply succeeded with
#                     direction_policy=portal-wins and at least one
#                     policy was skipped.
# An artifact (the re-exported tenant YAML) is the only data flow
# between the two jobs.
#
# Key Vault access: the runner principal signs the IPPS client_assertion
# JWT via `az keyvault key sign` against the environment's automation Key Vault (vars.KEY_VAULT_NAME). The vault is
# private-network by default in this lab; the apply job temp-opens the
# public endpoint for the duration of the apply / re-export and restores
# it via an `if: always()` step. This matches the local lab smoke recipe
# and the sibling deploy-labels.yml flow.
#
# References (Microsoft Learn / GitHub Docs / action upstreams):
#   https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect
#   https://learn.microsoft.com/en-us/powershell/exchange/connect-to-scc-powershell
#   https://learn.microsoft.com/en-us/powershell/exchange/app-only-auth-powershell-v2
#   https://learn.microsoft.com/en-us/powershell/module/exchangepowershell/get-labelpolicy
#   https://learn.microsoft.com/en-us/powershell/module/exchangepowershell/new-labelpolicy
#   https://learn.microsoft.com/en-us/powershell/module/exchangepowershell/set-labelpolicy
#   https://learn.microsoft.com/en-us/purview/create-sensitivity-labels#publish-sensitivity-labels-by-creating-a-label-policy
#   https://learn.microsoft.com/en-us/cli/azure/keyvault#az-keyvault-update
#   https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
#   https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onworkflow_dispatchinputs
#   https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idoutputs
#   https://github.com/peter-evans/create-pull-request
#   https://github.com/actions/upload-artifact
#   https://github.com/actions/download-artifact
#   https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#context-availability
#
# Skip gate (ADR 0054): this push-triggered workflow fires on every merge
# to a tracked branch, including on every un-onboarded template copy, and
# unconditionally assumed a real Purview tenant was wired up. The
# `preflight` job below tests the onboarding signal (a non-empty
# secrets.AZURE_CLIENT_ID and vars.KEY_VAULT_NAME on the selected GitHub
# Environment) from inside a running job -- `secrets` is not available in
# ANY `if:` condition, only in env/run/with -- and emits a `configured`
# output. The `apply` job below declares `needs: preflight` and `if:
# needs.preflight.outputs.configured == 'true'` (`needs` IS available in
# a job-level `if:`), so an un-onboarded copy SKIPS the apply job cleanly
# instead of failing at azure/login; `drift-back-pr` already only runs
# when `needs.apply.result == 'success'`, so it is transitively skipped
# too. This also folds in the KEY_VAULT_NAME throw guard that previously
# lived in the "Temporarily allow Key Vault public access" step.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: >-
          Target deployment environment (GitHub Environment name).
          Defaults to lab. Push/schedule runs map branch dev -> dev and
          every other branch -> lab (ADR 0057).
        type: choice
        options:
          - lab
          - dev
        default: lab
        required: false
      direction_policy:
        description: |
          ADR 0029 source-of-truth direction policy. Three modes:

          - audit       Read-only verify. No writes under any condition.
          - portal-wins Default. Create + non-conflicting updates apply;
                        shared-property drift is SKIPPED and a drift-back
                        PR is auto-opened listing the skipped policies.
          - repo-wins   DESTRUCTIVE. Overwrite tenant fields with YAML
                        values for shared-policy drift. Requires
                        confirm_overwrite='overwrite portal'.

          See docs/runbooks/labels-direction-policy.md.
        type: choice
        options:
          - audit
          - portal-wins
          - repo-wins
        default: portal-wins
        required: false
      confirm_overwrite:
        description: |
          Typed-confirmation token. When `direction_policy` is `repo-wins`
          this MUST equal the literal string `overwrite portal`
          (case-sensitive, two words separated by one space). Ignored
          when `direction_policy` is `audit` or `portal-wins`.
          Mirrors the destructive-write confirmation rule in
          .github/instructions/mcp-tool-usage.instructions.md.
        type: string
        default: ''
        required: false
  push:
    branches: [main, dev, lab]
    paths:
      - 'data-plane/information-protection/label-policies.yaml'
      - 'scripts/Deploy-LabelPolicies.ps1'
      - 'scripts/Get-PurviewIPPSAccessToken.ps1'
      - 'infra/parameters/*.yaml'
      - '.github/workflows/deploy-label-policies.yml'

# Deny-by-default at workflow scope. Each job declares the minimum
# permission set it needs. Reference:
# https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-the-permissions-key
permissions: {}

concurrency:
  group: deploy-label-policies-${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight (ADR 0054 onboarding signal)
    runs-on: ubuntu-latest
    # Binds the SAME selected environment as apply below (ADR 0057
    # canonical expression, byte-identical), so the secret and variable
    # it tests are the exact ones apply would use.
    environment: ${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
    permissions:
      contents: read
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    env:
      # secrets/vars are legal in jobs.<job_id>.env (not in jobs.<job_id>.if
      # or jobs.<job_id>.steps.if) -- see ADR 0054.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
    steps:
      - name: Check onboarding signal
        id: check
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:AZURE_CLIENT_ID)) {
            Write-Host "::notice::secrets.AZURE_CLIENT_ID is not set on this GitHub Environment. This copy is not onboarded to a Purview tenant (ADR 0054) -- skipping the tenant-touching job."
            Add-Content -Path $env:GITHUB_OUTPUT -Value "configured=false"
          } elseif ([string]::IsNullOrEmpty($env:KEY_VAULT_NAME)) {
            Write-Host "::notice::vars.KEY_VAULT_NAME is not set on this GitHub Environment. This copy is not onboarded to a Purview tenant (ADR 0054) -- skipping the tenant-touching job."
            Add-Content -Path $env:GITHUB_OUTPUT -Value "configured=false"
          } else {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "configured=true"
          }

  apply:
    name: Apply label policies
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
    permissions:
      id-token: write       # OIDC token for azure/login@v2.
      contents: read        # Checkout only; does not push or open PRs.
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
      # Reconciler parameters-file override (ADR 0057): every
      # Deploy-*.ps1 / Export-*.ps1 honors PURVIEW_PARAMETERS_FILE when
      # -ParametersFile is not passed explicitly.
      PURVIEW_PARAMETERS_FILE: infra/parameters/${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}.yaml
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
      # Defaults applied for `push` events (where github.event.inputs
      # is null) so the rest of the job can read the env vars
      # unconditionally and a push-triggered run behaves identically
      # to a dispatch with default inputs.
      DIRECTION_POLICY: ${{ github.event.inputs.direction_policy || 'portal-wins' }}
      CONFIRM_OVERWRITE: ${{ github.event.inputs.confirm_overwrite }}
    outputs:
      # Surfaced to the drift-back-pr job. `skip_count` defaults to '0'
      # when the enumerate step did not run (audit / repo-wins modes
      # and push events under non-portal-wins dispatch).
      skip_count: ${{ steps.enumerate.outputs.skip_count || '0' }}
      direction_policy: ${{ github.event.inputs.direction_policy || 'portal-wins' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail-fast pre-flight. Enforces the ADR 0029 typed-confirmation
      # gate for direction_policy=repo-wins BEFORE Azure login, BEFORE
      # the Key Vault unlock window, and BEFORE any data-plane call.
      # Inputs flow through env: to keep ${{ github.event.* }}
      # substitution outside the pwsh shell-quoting boundary per
      # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#understanding-the-risk-of-script-injections
      - name: Validate dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          DIRECTION_POLICY: ${{ env.DIRECTION_POLICY }}
          CONFIRM_OVERWRITE: ${{ env.CONFIRM_OVERWRITE }}
        run: |
          $policy = $env:DIRECTION_POLICY
          $overwrite = $env:CONFIRM_OVERWRITE
          $overwriteDisplay = if ([string]::IsNullOrEmpty($overwrite)) { '<empty>' } else { '<provided>' }
          Write-Host "direction_policy  = '$policy'"
          Write-Host "confirm_overwrite = $overwriteDisplay"

          # ADR 0029 typed-confirmation gate. -cne enforces a
          # case-sensitive comparison so 'Overwrite Portal' or
          # 'OVERWRITE PORTAL' do not satisfy the gate.
          if ($policy -eq 'repo-wins') {
            if ($overwrite -cne 'overwrite portal') {
              $msg = "::error::direction_policy=repo-wins requires confirm_overwrite to equal the literal string " +
                     "'overwrite portal' (case-sensitive, two words separated by one space). " +
                     "Re-dispatch with the correct token. See docs/runbooks/labels-direction-policy.md."
              Write-Host $msg
              exit 1
            }
            Write-Host '::warning::repo-wins confirmed. The Apply step will OVERWRITE tenant fields with YAML values for any shared-policy drift.'
          }

          if ($policy -eq 'audit') {
            Write-Host 'audit mode: this run will read tenant state and emit a plan; no writes will fire under any condition.'
          }
          if ($policy -eq 'portal-wins') {
            Write-Host 'portal-wins mode: shared-policy drift will be skipped (auto-PR will open if any).'
          }

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Install-Module powershell-yaml -Force -Scope CurrentUser
          # Connect-IPPSSession -AccessToken requires ExchangeOnlineManagement
          # v3.8.0-Preview1+; -AllowPrerelease until GA.
          # Reference: https://learn.microsoft.com/en-us/powershell/exchange/exchange-online-powershell-v2
          Install-Module ExchangeOnlineManagement -Force -Scope CurrentUser -AllowPrerelease

      - name: Temporarily allow Key Vault public access
        id: kv-open
        shell: pwsh
        run: |
          # KEY_VAULT_NAME is guaranteed non-empty here: the preflight job
          # (ADR 0054) already checked it and this job would have been
          # skipped, not started, if it were absent.
          az keyvault update `
            --name $env:KEY_VAULT_NAME `
            --public-network-access Enabled `
            --default-action Allow `
            --only-show-errors `
            -o none
          Add-Content -Path $env:GITHUB_OUTPUT -Value "opened=true"
          # Wait for the network rule change to propagate before the first
          # data-plane call (matches the local lab smoke recipe and #144).
          Start-Sleep -Seconds 30

      # First pass under portal-wins. Runs the script with the policy
      # active but writes gated by -WhatIf so the policy pass executes
      # (it is gated only by `DirectionPolicy -ne 'audit'`, not by
      # WhatIfPreference) and emits one [ADR0029-SKIP] line per policy
      # the policy would skip. The marker lines are the contract the
      # apply pass and the drift-back-pr job consume; they are emitted
      # by scripts/Deploy-LabelPolicies.ps1 (PR #468 / Phase 1).
      #
      # We cannot use -DirectionPolicy audit here because audit-mode
      # short-circuits BEFORE the policy pass, so it never emits SKIP
      # markers. The -WhatIf + portal-wins combination is the
      # script-contract-compatible way to enumerate skips without
      # touching the tenant.
      - name: Enumerate skipped policies (portal-wins read-only pass)
        id: enumerate
        if: env.DIRECTION_POLICY == 'portal-wins'
        shell: pwsh
        run: |
          $logFile = Join-Path $env:RUNNER_TEMP 'enumerate.log'
          # *>&1 merges all PowerShell streams (Information, Warning,
          # Error, Verbose, Debug) into the success stream so
          # Tee-Object captures the [ADR0029-SKIP] markers the script
          # emits via Write-Information -InformationAction Continue.
          ./scripts/Deploy-LabelPolicies.ps1 `
            -DirectionPolicy portal-wins `
            -WhatIf `
            -Confirm:$false `
            -InformationAction Continue `
            *>&1 | Tee-Object -FilePath $logFile

          $skipMatches = @(Select-String -Path $logFile -Pattern '^\[ADR0029-SKIP\] (.+)$' -CaseSensitive)
          $skipNames = @($skipMatches | ForEach-Object { $_.Matches[0].Groups[1].Value.Trim() })
          # ConvertTo-Json on a single-element array produces a scalar
          # string in PowerShell unless -AsArray is used; we always
          # emit a JSON array so the apply pass can ConvertFrom-Json
          # without special-casing.
          $json = if ($skipNames.Count -eq 0) {
            '[]'
          } else {
            ConvertTo-Json -InputObject $skipNames -Compress -AsArray
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "skip_count=$($skipNames.Count)"
          # Single-line JSON; safe to write via Add-Content because the
          # value contains no newlines.
          Add-Content -Path $env:GITHUB_OUTPUT -Value "skip_names_json=$json"
          Write-Host "Enumerate pass complete: $($skipNames.Count) policy/policies would be skipped under portal-wins."
          if ($skipNames.Count -gt 0) {
            Write-Host "Skipped policies: $($skipNames -join ', ')"
          }

      # Symmetry-only read-only pass for audit and repo-wins modes.
      # audit mode performs its real work here (no separate apply
      # follows). repo-wins gets a plan-output preview before the
      # apply pass overwrites tenant state.
      - name: Read-only plan pass (audit / repo-wins)
        if: env.DIRECTION_POLICY == 'audit' || env.DIRECTION_POLICY == 'repo-wins'
        shell: pwsh
        run: |
          if ($env:DIRECTION_POLICY -eq 'audit') {
            Write-Host 'audit mode: this is the only script invocation; no apply pass follows.'
          } else {
            Write-Host 'repo-wins read-only pass: plan visibility before the apply pass overwrites tenant state.'
          }
          ./scripts/Deploy-LabelPolicies.ps1 `
            -DirectionPolicy audit `
            -Confirm:$false `
            -InformationAction Continue

      # Apply pass: portal-wins. Threads the deterministic skip list
      # built by the enumerate pass into -SkipNames so the two passes
      # agree on which policies to skip even if tenant state shifted
      # between the calls.
      - name: Apply label policies (portal-wins)
        if: env.DIRECTION_POLICY == 'portal-wins'
        shell: pwsh
        env:
          SKIP_NAMES_JSON: ${{ steps.enumerate.outputs.skip_names_json }}
        run: |
          $skipNames = @()
          if (-not [string]::IsNullOrWhiteSpace($env:SKIP_NAMES_JSON) -and $env:SKIP_NAMES_JSON -ne '[]') {
            $skipNames = @(ConvertFrom-Json -InputObject $env:SKIP_NAMES_JSON)
          }
          $applyArgs = @{
            DirectionPolicy   = 'portal-wins'
            Confirm           = $false
            InformationAction = 'Continue'
          }
          if ($skipNames.Count -gt 0) {
            $applyArgs['SkipNames'] = $skipNames
          }
          Write-Host "Applying with -DirectionPolicy portal-wins and -SkipNames count=$($skipNames.Count)."
          ./scripts/Deploy-LabelPolicies.ps1 @applyArgs

      # Apply pass: repo-wins. No skip list (the contract of repo-wins
      # is "no shared-drift skip").
      - name: Apply label policies (repo-wins)
        if: env.DIRECTION_POLICY == 'repo-wins'
        shell: pwsh
        run: |
          Write-Host '::warning::repo-wins: tenant fields will be OVERWRITTEN with YAML values for every shared-policy drift. Each overwrite emits a Write-Warning naming the policy and fields. See ADR 0029.'
          ./scripts/Deploy-LabelPolicies.ps1 `
            -DirectionPolicy repo-wins `
            -Confirm:$false `
            -InformationAction Continue

      # Verify every desired Enable-mode policy reached Published. Only
      # meaningful when an apply pass actually ran (audit short-circuits
      # before writes; portal-wins may legitimately skip a policy whose
      # tenant state disagrees with YAML, in which case Verify-Published
      # may report Fail and we still want to surface it).
      - name: Verify all desired policies are Published
        if: env.DIRECTION_POLICY != 'audit'
        shell: pwsh
        run: |
          # Reads Get-LabelPolicy.Status directly and asserts every
          # desired policy with mode: Enable has reached
          # Status: Published. Throws on any Fail or Missing row,
          # propagating a non-zero exit code to the runner.
          # Reference: https://learn.microsoft.com/en-us/powershell/module/exchangepowershell/get-labelpolicy
          # Reference: https://learn.microsoft.com/en-us/purview/create-sensitivity-labels#when-changes-take-effect
          #
          # -Confirm:$false is DEFENCE IN DEPTH here, not a live fix. The
          # -VerifyPublished path provably cannot reach a prompt today: the
          # `if ($mode -eq 'Verify')` block ends in an unconditional `return`,
          # and every one of the script's 13 $PSCmdlet.ShouldProcess(...) sites
          # and both of its ADR 0052 gate sites lie strictly AFTER it, in the
          # Apply region. But `-VerifyPublished` is one refactor away from
          # sharing that region, and at ConfirmImpact = 'High' the first
          # ShouldProcess it reached would prompt on a hosted runner with no
          # one to answer. The binding costs nothing and removes the
          # dependence on that proof staying true.
          # Reference: docs/adr/0052-destructive-confirmation-gate-at-script-layer.md
          ./scripts/Deploy-LabelPolicies.ps1 -VerifyPublished -Confirm:$false -InformationAction Continue

      # Re-export tenant state and stage it as an artifact for the
      # drift-back-pr job. Runs only when portal-wins skipped at
      # least one policy, so unchanged tenants do not pay the cost.
      # Label policies do not carry principal identifiers like labels
      # do, so -RedactIdentities is not needed here; the schema only
      # holds policy names, modes, ExchangeLocation entries (mailbox
      # addresses), labels (GUIDs), and AdvancedSettings.
      - name: Re-export tenant label policies for drift-back PR
        if: success() && env.DIRECTION_POLICY == 'portal-wins' && steps.enumerate.outputs.skip_count != '0'
        shell: pwsh
        run: |
          # -Confirm:$false is REQUIRED, not decorative. ADR 0052 makes it the
          # rule for every CI invocation of a reconciler: Deploy-LabelPolicies.ps1
          # wraps its -ExportCurrentState YAML write in $PSCmdlet.ShouldProcess(...),
          # so the moment its ConfirmImpact reaches 'High' (#83) an unbound call
          # would raise a confirmation prompt no one can answer on a hosted runner
          # and the job would hang. -Force does not cover this: it guards only the
          # export file overwrite, never $ConfirmPreference.
          # Reference: docs/adr/0052-destructive-confirmation-gate-at-script-layer.md
          ./scripts/Deploy-LabelPolicies.ps1 `
            -ExportCurrentState `
            -Force `
            -Confirm:$false `
            -Path 'data-plane/information-protection/label-policies.yaml'

      - name: Upload drift-back YAML artifact
        if: success() && env.DIRECTION_POLICY == 'portal-wins' && steps.enumerate.outputs.skip_count != '0'
        # actions/upload-artifact@v4.6.2 (current major)
        uses: actions/upload-artifact@v4
        with:
          name: label-policies-drift-back-${{ github.run_id }}
          path: data-plane/information-protection/label-policies.yaml
          if-no-files-found: error
          retention-days: 1

      - name: Restore Key Vault network defaults
        if: always() && steps.kv-open.outputs.opened == 'true'
        shell: pwsh
        run: |
          az keyvault update `
            --name $env:KEY_VAULT_NAME `
            --public-network-access Disabled `
            --default-action Deny `
            --only-show-errors `
            -o none

  drift-back-pr:
    name: Open drift-back PR for skipped label policies
    needs: apply
    # Runs only on the happy path of a portal-wins dispatch that
    # actually skipped at least one policy. apply.outputs.skip_count is
    # the marker count parsed from the enumerate pass; for audit /
    # repo-wins / non-portal-wins push events it is '0' by default
    # (see jobs.apply.outputs.skip_count).
    if: |
      needs.apply.result == 'success' &&
      needs.apply.outputs.direction_policy == 'portal-wins' &&
      needs.apply.outputs.skip_count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # peter-evans/create-pull-request pushes the drift-back branch.
      pull-requests: write  # peter-evans/create-pull-request opens / updates the PR.
    env:
      SKIP_COUNT: ${{ needs.apply.outputs.skip_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Overlay the re-exported tenant YAML (produced by the apply
      # job) onto the working tree before invoking the PR action.
      # The artifact contains exactly one file at its tracked path.
      - name: Download drift-back YAML
        # actions/download-artifact@v4.3.0 (current major)
        uses: actions/download-artifact@v4
        with:
          name: label-policies-drift-back-${{ github.run_id }}
          path: data-plane/information-protection

      - name: Open or update drift-back PR
        id: cpr
        # peter-evans/create-pull-request@v8.1.1.
        # SHA shared with .github/workflows/sync-label-policies-from-tenant.yml
        # and .github/workflows/deploy-labels.yml.
        # Verified 2026-05-09 against
        # https://github.com/peter-evans/create-pull-request/releases/tag/v8.1.1
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          add-paths: data-plane/information-protection/label-policies.yaml
          # Distinct from auto/label-policies-drift-sync (used by the
          # scheduled sync-label-policies-from-tenant.yml) so an
          # apply-time drift-back PR and the daily scheduled drift-back
          # PR cannot fight over the same branch and PR.
          # Environment-suffixed so lab and dev drift-back PRs never
          # fight over one branch; base follows the triggering branch
          # so drift returns to the source-of-truth branch it came from
          # (ADR 0057).
          branch: auto/label-policies-portal-wins-drift-${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
          base: ${{ github.ref_name }}
          delete-branch: false
          title: 'chore(data-plane): drift-back sync label policies skipped under portal-wins'
          commit-message: |
            chore(data-plane): drift-back sync label policies skipped under portal-wins

            Automated drift-back from a portal-wins dispatch of
            deploy-label-policies.yml that skipped one or more
            shared-policy property drifts per ADR 0029. Re-exports the
            live Microsoft Purview / Microsoft 365 sensitivity-label
            policies in the target tenant into
            data-plane/information-protection/label-policies.yaml so
            the repo can be brought back in sync with the tenant.

            See: https://learn.microsoft.com/en-us/powershell/module/exchangepowershell/set-labelpolicy
            ADR: docs/adr/0029-source-of-truth-direction-policy.md
          labels: |
            needs-review
            squad:automation-engineer
          body: |
            Automated drift-back from `.github/workflows/deploy-label-policies.yml`.

            A `direction_policy=portal-wins` dispatch (per
            [ADR 0029](../blob/main/docs/adr/0029-source-of-truth-direction-policy.md))
            skipped **${{ env.SKIP_COUNT }}** shared policy/policies
            because the tenant value disagreed with the committed YAML.
            This PR re-exports the live tenant state via
            `scripts/Deploy-LabelPolicies.ps1 -ExportCurrentState` so
            the repo can be brought back in sync.

            ## Review checklist

            - [ ] **Decide which side wins.** If the tenant value is the
                  intended one, **merge this PR** -- the next push run on
                  `main` will then pass cleanly. If the YAML value is
                  the intended one, **close this PR** and re-dispatch
                  `deploy-label-policies.yml` with
                  `direction_policy=repo-wins` and
                  `confirm_overwrite=overwrite portal` to push the YAML
                  to the tenant. See
                  [`docs/runbooks/labels-direction-policy.md`](../blob/main/docs/runbooks/labels-direction-policy.md).
            - [ ] No real tenant or principal identifiers leaked into
                  the diff (mailbox addresses in `exchangeLocation`
                  may be tenant-real -- verify they match the synthetic
                  placeholders documented in
                  [`.github/instructions/sample-data.instructions.md`](../blob/main/.github/instructions/sample-data.instructions.md)).

            ## Notes

            - This PR was opened by the GitHub Actions `GITHUB_TOKEN`,
              so the PR-open event does **not** automatically dispatch
              other workflows (`validate.yml` etc.). To run validation,
              **close and reopen this PR**, or push an empty commit to
              the `auto/label-policies-portal-wins-drift-<environment>` branch.
            - Trigger: run [${{ github.run_id }}](../actions/runs/${{ github.run_id }})
              of `${{ github.workflow }}` on
              `${{ github.ref_name }}` at `${{ github.sha }}`.

            Refs: ADR 0029