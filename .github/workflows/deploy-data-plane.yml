name: deploy-data-plane

# Manual-dispatch only until Wave 0 ships OIDC federated credentials
# (scripts/New-AutomationIdentity.ps1), the Purview account exists, and
# the Deploy-*.ps1 scripts under scripts/ are no longer skeletons.
# Re-add the `push:` trigger in the same PR that lands those deliverables.
# Reference: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect
on:
  workflow_dispatch:
    inputs:
      prune_role_groups:
        description: >-
          Pass -PruneMissing to Deploy-PurviewRoleGroups.ps1. Destructive:
          removes Entra-group memberships from Purview portal role groups that
          are not declared in data-plane/purview-role-groups/role-groups.yaml.
          Leave false unless intentionally reconciling drift.
        type: boolean
        default: false
        required: false
      plan_labels_only:
        description: >-
          Run Deploy-Labels.ps1 in -WhatIf mode (plan only, no Set-Label
          calls). Use this to preview the reconciler plan against the live
          tenant before a live apply. Leave false to apply the YAML.
        type: boolean
        default: false
        required: false
      # ADR 0029 inputs for Deploy-DLPPolicies.ps1. Mirror the shape of
      # deploy-labels.yml (#463); see docs/runbooks/labels-direction-policy.md
      # for the binding model the dedicated label workflows established.
      # The dedicated DLP workflow refactor is a separate follow-up; for now
      # the inputs live on this monolithic dispatch and gate one step.
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      dlp_direction_policy:
        description: |
          ADR 0029 source-of-truth direction policy for the DLP step
          (Deploy-DLPPolicies.ps1). Three modes:

          - audit       Read-only verify. No writes under any condition.
          - portal-wins Default. Create + non-conflicting updates apply;
                        shared-property drift is SKIPPED.
          - repo-wins   DESTRUCTIVE. Overwrite tenant fields with YAML
                        values for shared-policy / shared-rule drift.
                        Requires confirm_overwrite_dlp='overwrite portal'.
        type: choice
        options:
          - audit
          - portal-wins
          - repo-wins
        default: portal-wins
        required: false
      confirm_overwrite_dlp:
        description: |
          Typed-confirmation token for the DLP step. When
          `dlp_direction_policy` is `repo-wins` this MUST equal the literal
          string `overwrite portal` (case-sensitive, two words separated
          by one space). Ignored otherwise. Mirrors the destructive-write
          confirmation rule in
          .github/instructions/mcp-tool-usage.instructions.md.
        type: string
        default: ''
        required: false
      skip_names_dlp:
        description: |
          Optional comma-separated list of DLP policy / rule names to skip
          even when they would otherwise drift. Wired to
          Deploy-DLPPolicies.ps1 -SkipNames. Leave empty for normal runs.
          Case-insensitive; whitespace around commas is trimmed.
        type: string
        default: ''
        required: false
      # ADR 0029 inputs for Deploy-RetentionPolicies.ps1. Mirror the
      # shape of the DLP block above; see #571 for the per-script
      # retrofit. Desired state is `policies: []` today, so these
      # inputs are scaffolding until the first retention-policy
      # declaration lands.
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      retention_direction_policy:
        description: |
          ADR 0029 source-of-truth direction policy for the retention
          step (Deploy-RetentionPolicies.ps1). Three modes:

          - audit       Read-only verify. No writes under any condition.
          - portal-wins Default. Create + non-conflicting updates apply;
                        shared-property drift is SKIPPED.
          - repo-wins   DESTRUCTIVE. Overwrite tenant fields with YAML
                        values for shared-policy / shared-rule drift.
                        Requires confirm_overwrite_retention='overwrite portal'.
        type: choice
        options:
          - audit
          - portal-wins
          - repo-wins
        default: portal-wins
        required: false
      confirm_overwrite_retention:
        description: |
          Typed-confirmation token for the retention step. When
          `retention_direction_policy` is `repo-wins` this MUST equal
          the literal string `overwrite portal` (case-sensitive, two
          words separated by one space). Ignored otherwise.
        type: string
        default: ''
        required: false
      skip_names_retention:
        description: |
          Optional comma-separated list of retention policy / rule
          names to skip even when they would otherwise drift. Wired to
          Deploy-RetentionPolicies.ps1 -SkipNames. Leave empty for
          normal runs. Case-insensitive; whitespace around commas is
          trimmed.
        type: string
        default: ''
        required: false
      # ADR 0029 inputs for Deploy-FilePlan.ps1 (Records Management).
      # Mirror the shape of the DLM block above; see #584 for the
      # per-script retrofit (PR #588). Desired-state YAML is empty
      # today; the workflow ships with a baseline `skip_names_records`
      # default carrying the 31 Microsoft File Plan Manager seed
      # property objects per docs/adr/0035-records-seed-content-immovable.md
      # so every dispatch defaults to noise-free output.
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      # Reference: docs/adr/0035-records-seed-content-immovable.md
      records_direction_policy:
        description: |
          ADR 0029 source-of-truth direction policy for the Records
          Management step (Deploy-FilePlan.ps1). Three modes:

          - audit       Read-only verify. No writes under any condition.
          - portal-wins Default. Create + non-conflicting updates apply;
                        shared-property drift on labels is SKIPPED.
                        File plan property objects have no Set-* cmdlet
                        and surface as DriftWarn either way.
          - repo-wins   DESTRUCTIVE. Overwrite tenant fields with YAML
                        values for shared-label drift.
                        Requires confirm_overwrite_records='overwrite portal'.
        type: choice
        options:
          - audit
          - portal-wins
          - repo-wins
        default: portal-wins
        required: false
      confirm_overwrite_records:
        description: |
          Typed-confirmation token for the Records Management step.
          When `records_direction_policy` is `repo-wins` this MUST
          equal the literal string `overwrite portal` (case-sensitive,
          two words separated by one space). Ignored otherwise.
        type: string
        default: ''
        required: false
      skip_names_records:
        description: |
          Comma-separated list of Records Management label / property
          names to skip even when they would otherwise drift. Wired to
          Deploy-FilePlan.ps1 -SkipNames. Case-insensitive; whitespace
          around commas is trimmed. The default carries the 29 unique
          names that cover the 31 Microsoft File Plan Manager seed
          property objects ratified as immovable in
          docs/adr/0035-records-seed-content-immovable.md (Legal and
          Procurement each appear under two property kinds; -SkipNames
          matches by bare Name regardless of kind, so 29 unique names
          cover all 31 tenant rows). If Microsoft ever shrinks or
          grows the seed list in a service revision, update this
          default, ADR 0035's source-of-truth table, and the runbook
          at docs/runbooks/records-end-to-end-smoke.md together.
        type: string
        default: 'Business,Legal,Regulatory,Accounts payable,Accounts receivable,Administration,Compliance,Contracting,Financial statements,Learning and development,Payroll,Planning,Policies and procedures,Procurement,Recruiting and hiring,Research and development,Commodity Exchange Act,Health Insurance Portability and Accountability Act of 1996,OSHA Injury and Illness Recordkeeping and Reporting Requirements,Sarbanes-Oxley Act of 2002,Truth in Lending Act,Finance,Human resources,Information technology,Marketing,Operations,Products,Sales,Services'
        required: false
      # ADR 0029 inputs for Deploy-IRMPolicies.ps1 (Insider Risk Management).
      # Mirror the shape of the Records block above; see #603 for the
      # per-script retrofit. Desired-state YAML is empty today; the
      # workflow ships with a baseline `skip_names_irm` default
      # carrying the 4 operator-authored `IRM Lab — *` names ratified as
      # permanent skip in
      # docs/adr/0036-irm-tenant-setting-immovable.md (the #603 hard-rule
      # mid-testing policies). The system-managed tenant-setting policy
      # is NOT baselined: the reconciler classifies it NoChange via a
      # name-prefix wildcard (`IRM_Tenant_Setting_*`).
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      # Reference: docs/adr/0036-irm-tenant-setting-immovable.md
      irm_direction_policy:
        description: |
          ADR 0029 source-of-truth direction policy for the Insider
          Risk Management step (Deploy-IRMPolicies.ps1). Three modes:

          - audit       Read-only verify. No writes under any condition.
          - portal-wins Default. Create + non-conflicting updates apply;
                        shared-property drift is SKIPPED.
          - repo-wins   DESTRUCTIVE. Overwrite tenant fields with YAML
                        values for shared-policy drift.
                        Requires confirm_overwrite_irm='overwrite portal'.
        type: choice
        options:
          - audit
          - portal-wins
          - repo-wins
        default: portal-wins
        required: false
      confirm_overwrite_irm:
        description: |
          Typed-confirmation token for the Insider Risk Management
          step. When `irm_direction_policy` is `repo-wins` this MUST
          equal the literal string `overwrite portal` (case-sensitive,
          two words separated by one space). Ignored otherwise.
        type: string
        default: ''
        required: false
      skip_names_irm:
        description: |
          Comma-separated list of Insider Risk Management policy
          names to skip even when they would otherwise drift. Wired
          to Deploy-IRMPolicies.ps1 -SkipNames. Case-insensitive;
          whitespace around commas is trimmed. The default carries
          the 4 operator-authored `IRM Lab — *` policy names ratified
          as permanent skip in
          docs/adr/0036-irm-tenant-setting-immovable.md under the
          issue #603 hard rule (mid-testing window). The system-managed
          `IRM_Tenant_Setting_<tenant-guid>` policy is NOT baselined
          here: the reconciler classifies it NoChange via a name-prefix
          wildcard, so it never plans a mutation regardless of this
          list. If the operator-authored testing window closes and the
          four `IRM Lab — *` policies are adopted into desired state via
          follow-up #604, update this default, ADR 0036's
          source-of-truth table, and the runbook at
          docs/runbooks/irm-end-to-end-smoke.md together.
        type: string
        default: 'IRM Lab — Data leaks by priority users,IRM Lab — Data theft by departing users,IRM Lab — General data leaks,IRM Lab — Risky AI usage'
        required: false
      # ADR 0029 inputs for Deploy-IRMEntityLists.ps1 (Insider Risk
      # Management entity lists). Mirror the shape of the IRM policies
      # block above; see #606 for the per-script wiring. Desired-state
      # YAML is empty today; the workflow ships with a baseline
      # `skip_names_irm_entity_list` default carrying the 1 name
      # ratified as permanent skip in
      # docs/adr/0039-irm-entity-list-tracked-fields.md:
      # `IRM-Lab-Priority-Users` (mid-testing window).
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      # Reference: docs/adr/0039-irm-entity-list-tracked-fields.md
      irm_entity_list_direction_policy:
        description: |
          ADR 0029 source-of-truth direction policy for the Insider
          Risk Management entity lists step (Deploy-IRMEntityLists.ps1).
          Three modes:

          - audit       Read-only verify. No writes under any condition.
          - portal-wins Default. Create + non-conflicting updates apply;
                        shared-property drift is SKIPPED.
          - repo-wins   DESTRUCTIVE. Overwrite tenant fields with YAML
                        values for shared-entity-list drift.
                        Requires confirm_overwrite_irm_entity_list='overwrite portal'.
        type: choice
        options:
          - audit
          - portal-wins
          - repo-wins
        default: portal-wins
        required: false
      confirm_overwrite_irm_entity_list:
        description: |
          Typed-confirmation token for the Insider Risk Management
          entity lists step. When `irm_entity_list_direction_policy`
          is `repo-wins` this MUST equal the literal string
          `overwrite portal` (case-sensitive, two words separated by
          one space). Ignored otherwise.
        type: string
        default: ''
        required: false
      skip_names_irm_entity_list:
        description: |
          Comma-separated list of Insider Risk Management entity list
          names to skip even when they would otherwise drift. Wired
          to Deploy-IRMEntityLists.ps1 -SkipNames. Case-insensitive;
          whitespace around commas is trimmed. The default carries
          the 1 name ratified as permanent skip in
          docs/adr/0039-irm-entity-list-tracked-fields.md:
          `IRM-Lab-Priority-Users` (backing the
          `IRM Lab -- Data leaks by priority users` policy; under
          the #603 hard rule). Remove this default only after the
          #603 testing window closes and the entity list is adopted
          into desired state via follow-up #604/#606.
        type: string
        default: 'IRM-Lab-Priority-Users'
        required: false
      # ADR 0029 inputs for Deploy-Collections.ps1 (Purview Data Map
      # collections). Mirror the shape of the IRM block above; see
      # #614 for the per-script retrofit. Desired-state YAML imports
      # the live tenant hierarchy (PR #613); the workflow ships with
      # an empty `skip_names_collections` default since no permanent
      # declared-orphan baseline exists yet.
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      collections_direction_policy:
        description: |
          ADR 0029 source-of-truth direction policy for the Purview
          Data Map collections step (Deploy-Collections.ps1). Three
          modes:

          - audit       Read-only verify. No writes under any condition.
          - portal-wins Default. Create + non-conflicting updates apply;
                        shared-property drift is SKIPPED.
          - repo-wins   DESTRUCTIVE. Overwrite tenant fields with YAML
                        values for shared-property drift.
                        Requires confirm_overwrite_collections='overwrite portal'.
        type: choice
        options:
          - audit
          - portal-wins
          - repo-wins
        default: portal-wins
        required: false
      confirm_overwrite_collections:
        description: |
          Typed-confirmation token for the collections step. When
          `collections_direction_policy` is `repo-wins` this MUST equal
          the literal string `overwrite portal` (case-sensitive, two
          words separated by one space). Ignored otherwise.
        type: string
        default: ''
        required: false
      skip_names_collections:
        description: |
          Optional comma-separated list of Purview collection names
          (URL segments) to skip even when they would otherwise drift.
          Wired to Deploy-Collections.ps1 -SkipNames. Leave empty for
          normal runs. Case-insensitive; whitespace around commas is
          trimmed.
        type: string
        default: ''
        required: false
      # ADR 0029 inputs for Deploy-DataSources.ps1 (Purview Data Map
      # data sources). Mirror the shape of the Collections block
      # above; see #617 for the per-script retrofit. Desired-state
      # YAML carries the live tenant topology imported in PR #616;
      # the workflow ships with an empty `skip_names_data_sources`
      # default since no permanent declared-orphan baseline exists.
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      data_sources_direction_policy:
        description: |
          ADR 0029 source-of-truth direction policy for the Purview
          Data Map data sources step (Deploy-DataSources.ps1). Three
          modes:

          - audit       Read-only verify. No writes under any condition.
          - portal-wins Default. Create + non-conflicting updates apply;
                        shared-property drift is SKIPPED.
          - repo-wins   DESTRUCTIVE. Overwrite tenant fields with YAML
                        values for shared-property drift.
                        Requires confirm_overwrite_data_sources='overwrite portal'.
        type: choice
        options:
          - audit
          - portal-wins
          - repo-wins
        default: portal-wins
        required: false
      confirm_overwrite_data_sources:
        description: |
          Typed-confirmation token for the data sources step. When
          `data_sources_direction_policy` is `repo-wins` this MUST
          equal the literal string `overwrite portal` (case-sensitive,
          two words separated by one space). Ignored otherwise.
        type: string
        default: ''
        required: false
      skip_names_data_sources:
        description: |
          Optional comma-separated list of Purview data source names
          to skip even when they would otherwise drift. Wired to
          Deploy-DataSources.ps1 -SkipNames. Leave empty for normal
          runs. Case-insensitive; whitespace around commas is trimmed.
        type: string
        default: ''
        required: false
      # ADR 0029 inputs for Deploy-Scans.ps1 (Purview Data Map scans,
      # scan rulesets, triggers). Mirror the shape of the Data Sources
      # block above; see #620 for the per-script retrofit. Desired-state
      # YAML carries the live tenant topology imported in PR #619; the
      # workflow ships with an empty `skip_names_scans` default since
      # no permanent declared-orphan baseline exists. Skip names for
      # scans / triggers use the composite `<dataSource>/<scanName>`
      # key emitted in plan rows; ruleset rows use the bare ruleset name.
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      scans_direction_policy:
        description: |
          ADR 0029 source-of-truth direction policy for the Purview
          Data Map scans step (Deploy-Scans.ps1). Three modes:

          - audit       Read-only verify. No writes under any condition.
          - portal-wins Default. Create + non-conflicting updates apply;
                        shared-property drift is SKIPPED.
          - repo-wins   DESTRUCTIVE. Overwrite tenant fields with YAML
                        values for shared-property drift.
                        Requires confirm_overwrite_scans='overwrite portal'.
        type: choice
        options:
          - audit
          - portal-wins
          - repo-wins
        default: portal-wins
        required: false
      confirm_overwrite_scans:
        description: |
          Typed-confirmation token for the scans step. When
          `scans_direction_policy` is `repo-wins` this MUST equal the
          literal string `overwrite portal` (case-sensitive, two words
          separated by one space). Ignored otherwise.
        type: string
        default: ''
        required: false
      skip_names_scans:
        description: |
          Optional comma-separated list of Purview scan, scan ruleset,
          or trigger names to skip even when they would otherwise drift.
          Scan and trigger rows use the composite
          `<dataSource>/<scanName>` key; ruleset rows use the bare
          ruleset name. Wired to Deploy-Scans.ps1 -SkipNames. Leave
          empty for normal runs. Case-insensitive; whitespace around
          commas is trimmed.
        type: string
        default: ''
        required: false
      # ADR 0029 inputs for Deploy-Glossary.ps1 (Purview Data Map glossary
      # terms). Mirror the shape of the Scans block above; see #644 for
      # the Phase 3+4 retrofit. The `-SkipNames` baseline for glossary is
      # empty on initial delivery (no permanent declared-orphan terms exist).
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      glossary_direction_policy:
        description: |
          ADR 0029 source-of-truth direction policy for the glossary
          step (Deploy-Glossary.ps1). Three modes:

          - audit       Read-only verify. No writes under any condition.
          - portal-wins Default. Create + non-conflicting updates apply;
                        shared-property drift is SKIPPED.
          - repo-wins   DESTRUCTIVE. Overwrite tenant fields with YAML
                        values for shared-property drift.
                        Requires confirm_overwrite_glossary='overwrite portal'.
        type: choice
        options:
          - audit
          - portal-wins
          - repo-wins
        default: portal-wins
        required: false
      confirm_overwrite_glossary:
        description: |
          Typed-confirmation token for the glossary step. When
          `glossary_direction_policy` is `repo-wins` this MUST equal
          the literal string `overwrite portal` (case-sensitive, two
          words separated by one space). Ignored otherwise.
        type: string
        default: ''
        required: false
      skip_names_glossary:
        description: |
          Optional comma-separated list of glossary term names to skip
          even when they would otherwise drift. Wired to
          Deploy-Glossary.ps1 -SkipNames. Leave empty for normal runs.
          Case-insensitive; whitespace around commas is trimmed.
        type: string
        default: ''
        required: false
      # ADR 0029 inputs for Set-AuditRetentionPolicy.ps1 (unified audit log
      # retention). Mirror the shape of the Glossary block above; see #569
      # for the per-script retrofit. Desired state is `policies: []` today,
      # so these inputs are scaffolding until the first audit-retention
      # policy declaration lands.
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      audit_retention_direction_policy:
        description: |
          ADR 0029 source-of-truth direction policy for the audit
          retention step (Set-AuditRetentionPolicy.ps1). Three modes:

          - audit       Read-only verify. No writes under any condition.
          - portal-wins Default. Create + non-conflicting updates apply;
                        shared-property drift is SKIPPED.
          - repo-wins   DESTRUCTIVE. Overwrite tenant fields with YAML
                        values for shared-property drift.
                        Requires confirm_overwrite_audit_retention='overwrite portal'.
        type: choice
        options:
          - audit
          - portal-wins
          - repo-wins
        default: portal-wins
        required: false
      confirm_overwrite_audit_retention:
        description: |
          Typed-confirmation token for the audit retention step. When
          `audit_retention_direction_policy` is `repo-wins` this MUST
          equal the literal string `overwrite portal` (case-sensitive,
          two words separated by one space). Ignored otherwise.
        type: string
        default: ''
        required: false
      skip_names_audit_retention:
        description: |
          Optional comma-separated list of audit retention policy names
          to skip even when they would otherwise drift. Wired to
          Set-AuditRetentionPolicy.ps1 -SkipNames. Leave empty for
          normal runs. Case-insensitive; whitespace around commas is
          trimmed.
        type: string
        default: ''
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: lab
    env:
      PURVIEW_ACCOUNT: ${{ vars.PURVIEW_ACCOUNT_NAME }}
      KEY_VAULT_NAME: kv-contoso-lab-01
      RESOURCE_GROUP: rg-purview-lab
    steps:
      - uses: actions/checkout@v4

      # Fail-fast pre-flight for the DLP step's ADR 0029 typed-confirmation
      # gate. Runs BEFORE Azure login, BEFORE Key Vault unlock, and BEFORE
      # any data-plane call so a missing `confirm_overwrite_dlp` token on a
      # `dlp_direction_policy=repo-wins` dispatch fails cheap. Inputs flow
      # through env: to keep ${{ github.event.* }} substitution outside the
      # pwsh shell-quoting boundary.
      # Reference: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#understanding-the-risk-of-script-injections
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      - name: Validate DLP dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          DLP_DIRECTION_POLICY: ${{ inputs.dlp_direction_policy }}
          CONFIRM_OVERWRITE_DLP: ${{ inputs.confirm_overwrite_dlp }}
        run: |
          $policy = $env:DLP_DIRECTION_POLICY
          $overwrite = $env:CONFIRM_OVERWRITE_DLP
          $overwriteDisplay = if ([string]::IsNullOrEmpty($overwrite)) { '<empty>' } else { '<provided>' }
          Write-Host "dlp_direction_policy  = '$policy'"
          Write-Host "confirm_overwrite_dlp = $overwriteDisplay"
          # ADR 0029 typed-confirmation gate. -cne enforces case-sensitive
          # comparison so 'Overwrite Portal' or 'OVERWRITE PORTAL' do not
          # satisfy the gate.
          if ($policy -eq 'repo-wins') {
            if ($overwrite -cne 'overwrite portal') {
              $msg = "::error::dlp_direction_policy=repo-wins requires confirm_overwrite_dlp to equal the literal string " +
                     "'overwrite portal' (case-sensitive, two words separated by one space). " +
                     "Re-dispatch with the correct token. See docs/runbooks/dlp-end-to-end-smoke.md."
              Write-Host $msg
              exit 1
            }
            Write-Host '::warning::repo-wins confirmed. The Deploy DLP policies step will OVERWRITE tenant fields with YAML values for any shared-policy / shared-rule drift.'
          }

      # Fail-fast pre-flight for the retention step's ADR 0029
      # typed-confirmation gate. Same shape and rationale as the DLP
      # gate above.
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      - name: Validate retention dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          RETENTION_DIRECTION_POLICY: ${{ inputs.retention_direction_policy }}
          CONFIRM_OVERWRITE_RETENTION: ${{ inputs.confirm_overwrite_retention }}
        run: |
          $policy = $env:RETENTION_DIRECTION_POLICY
          $overwrite = $env:CONFIRM_OVERWRITE_RETENTION
          $overwriteDisplay = if ([string]::IsNullOrEmpty($overwrite)) { '<empty>' } else { '<provided>' }
          Write-Host "retention_direction_policy  = '$policy'"
          Write-Host "confirm_overwrite_retention = $overwriteDisplay"
          if ($policy -eq 'repo-wins') {
            if ($overwrite -cne 'overwrite portal') {
              $msg = "::error::retention_direction_policy=repo-wins requires confirm_overwrite_retention to equal the literal string " +
                     "'overwrite portal' (case-sensitive, two words separated by one space). " +
                     "Re-dispatch with the correct token. See docs/runbooks/dlm-end-to-end-smoke.md."
              Write-Host $msg
              exit 1
            }
            Write-Host '::warning::repo-wins confirmed. The Deploy retention policies step will OVERWRITE tenant fields with YAML values for any shared-policy / shared-rule drift.'
          }

      # Fail-fast pre-flight for the Records Management step's
      # ADR 0029 typed-confirmation gate. Same shape and rationale as
      # the DLP / retention gates above.
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      - name: Validate records dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          RECORDS_DIRECTION_POLICY: ${{ inputs.records_direction_policy }}
          CONFIRM_OVERWRITE_RECORDS: ${{ inputs.confirm_overwrite_records }}
        run: |
          $policy = $env:RECORDS_DIRECTION_POLICY
          $overwrite = $env:CONFIRM_OVERWRITE_RECORDS
          $overwriteDisplay = if ([string]::IsNullOrEmpty($overwrite)) { '<empty>' } else { '<provided>' }
          Write-Host "records_direction_policy  = '$policy'"
