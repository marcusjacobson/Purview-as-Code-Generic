          SKIP_NAMES_IRM_ENTITY_LIST: ${{ inputs.skip_names_irm_entity_list }}
        run: |
          $policy = if ([string]::IsNullOrEmpty($env:IRM_ENTITY_LIST_DIRECTION_POLICY)) { 'portal-wins' } else { $env:IRM_ENTITY_LIST_DIRECTION_POLICY }
          $skipNames = @()
          if (-not [string]::IsNullOrWhiteSpace($env:SKIP_NAMES_IRM_ENTITY_LIST)) {
            $skipNames = @($env:SKIP_NAMES_IRM_ENTITY_LIST -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          }
          $applyArgs = @{
            DirectionPolicy   = $policy
