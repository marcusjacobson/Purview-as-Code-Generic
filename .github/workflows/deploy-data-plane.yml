          SKIP_NAMES_AUDIT_RETENTION: ${{ inputs.skip_names_audit_retention }}
        run: |
          $policy = if ([string]::IsNullOrEmpty($env:AUDIT_RETENTION_DIRECTION_POLICY)) { 'portal-wins' } else { $env:AUDIT_RETENTION_DIRECTION_POLICY }
          $skipNames = @()
          if (-not [string]::IsNullOrWhiteSpace($env:SKIP_NAMES_AUDIT_RETENTION)) {
            $skipNames = @($env:SKIP_NAMES_AUDIT_RETENTION -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          }
          $applyArgs = @{
            DirectionPolicy   = $policy
            Confirm           = $false
            InformationAction = 'Continue'
          }
          if ($skipNames.Count -gt 0) {
            $applyArgs['SkipNames'] = $skipNames
            Write-Host "-SkipNames count = $($skipNames.Count): $($skipNames -join ', ')"
          }
          if ($policy -eq 'repo-wins') {
            Write-Host '::warning::repo-wins: audit retention tenant fields will be OVERWRITTEN with YAML values for shared-policy drift. Each overwrite emits a Write-Warning naming the field set. See ADR 0029.'
          }
          Write-Host "Applying with -DirectionPolicy $policy"
          ./scripts/Set-AuditRetentionPolicy.ps1 @applyArgs

      # Reconciles Microsoft 365 Data Lifecycle Management retention
      # policies and rules declared in
      # data-plane/data-lifecycle/retention-policies.yaml using the same
      # Security & Compliance PowerShell + Key Vault cert pattern as the
      # steps above. Sits inside the shared kv-open / kv-close window.
      # The reconciler is idempotent (Create / Update / NoChange /
      # Orphan) and operates on both retention compliance policies and
      # their child rules in lockstep. The
      # `retention_direction_policy` dispatch input wires through the
      # ADR 0029 contract (-DirectionPolicy + -SkipNames) shipped in
      # PR #571. Current desired state is `policies: []`; the step
      # remains a no-op until the first retention-policy declaration
      # is added.
      # Reference: https://learn.microsoft.com/en-us/purview/data-lifecycle-management
      # Reference: https://learn.microsoft.com/en-us/purview/retention
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/new-retentioncompliancepolicy
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/new-retentioncompliancerule
      # Reference: data-plane/data-lifecycle/retention-policies.schema.json
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      # Reference: docs/runbooks/dlm-end-to-end-smoke.md
      - name: Deploy retention policies
        shell: pwsh
        env:
          RETENTION_DIRECTION_POLICY: ${{ inputs.retention_direction_policy }}
          SKIP_NAMES_RETENTION: ${{ inputs.skip_names_retention }}
        run: |
          $policy = if ([string]::IsNullOrEmpty($env:RETENTION_DIRECTION_POLICY)) { 'portal-wins' } else { $env:RETENTION_DIRECTION_POLICY }
          $skipNames = @()
          if (-not [string]::IsNullOrWhiteSpace($env:SKIP_NAMES_RETENTION)) {
            $skipNames = @($env:SKIP_NAMES_RETENTION -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          }
          $applyArgs = @{
            DirectionPolicy   = $policy
            Confirm           = $false
            InformationAction = 'Continue'
          }
          if ($skipNames.Count -gt 0) {
            $applyArgs['SkipNames'] = $skipNames
            Write-Host "-SkipNames count = $($skipNames.Count): $($skipNames -join ', ')"
          }
          if ($policy -eq 'repo-wins') {
            Write-Host '::warning::repo-wins: retention tenant fields will be OVERWRITTEN with YAML values for shared-policy / shared-rule drift. Each overwrite emits a Write-Warning naming the field set. See ADR 0029.'
          }
          Write-Host "Applying with -DirectionPolicy $policy"
