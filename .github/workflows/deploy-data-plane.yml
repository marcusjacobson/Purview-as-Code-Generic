      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install powershell-yaml
        shell: pwsh
        run: Install-Module powershell-yaml -Force -Scope CurrentUser

      # Entra administrative units reconcile against Microsoft Graph, not the
      # Purview control plane, so this step runs before every Purview-scope
      # step and does not take -AccountName. The script acquires a Graph token
      # via `az account get-access-token --resource https://graph.microsoft.com`,
      # piggybacking on the azure/login@v2 context above.
      # Reference: docs/adr/0002-administrative-units.md
      # Reference: https://learn.microsoft.com/en-us/graph/api/resources/administrativeunit
      # TODO (§8 Q3): the workload identity provisioned by
      # scripts/New-AutomationIdentity.ps1 must be granted the Microsoft Graph
      # application permission AdministrativeUnit.ReadWrite.All (or at minimum
      # AdministrativeUnit.Read.All while data-plane/administrative-units/administrative-units.yaml
      # remains the default empty list) and admin-consent in the tenant before
      # this step can succeed on a non-empty YAML payload.
      - name: Deploy administrative units
        shell: pwsh
        run: ./scripts/Deploy-AdministrativeUnits.ps1

      # Reconciles Microsoft Purview portal role-group memberships (Entra
      # security groups only -- user members are out of scope by design) via
      # Security & Compliance PowerShell using the data-plane app-only
      # certificate stored in Key Vault. Runs before catalog content because
      # role groups gate who can manage collections, classifications, scans,
      # and policies.
      #
      # kv-contoso-lab-01 is publicNetworkAccess: Disabled in steady state
      # per Wave 0 #5a, and GitHub-hosted runners are not on the Key Vault
      # trusted-services bypass list, so the data-plane SP cannot read the
      # gh-oidc-purview-data-plane certificate from the runner over the
      # public endpoint without an explicit firewall allowance. The pre-step
      # below detects the runner public IP, switches PNA to Enabled with
      # default-action Deny, and adds the runner /32 as the only allowed IP.
      # The paired close step below runs with `if: always()` so the vault
      # returns to PNA Disabled with zero firewall rules even when the role-
      # groups step fails. The data-plane SP holds Key Vault Contributor on
      # kv-contoso-lab-01, which authorizes the PNA / network-rule toggles.
      # Reference: https://learn.microsoft.com/en-us/azure/key-vault/general/network-security
      # Reference: https://learn.microsoft.com/en-us/cli/azure/keyvault/network-rule
      # Reference: https://docs.github.com/en/actions/learn-github-actions/expressions#always
      - name: Open Key Vault firewall for runner IP
        id: kv-open
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $runnerIp = (Invoke-RestMethod -Uri 'https://api.ipify.org' -TimeoutSec 15).Trim()
          if ($runnerIp -notmatch '^\d{1,3}(\.\d{1,3}){3}$') {
            throw "Failed to resolve runner public IP: '$runnerIp'"
          }
          Write-Host "Runner public IP: $runnerIp"
          "runner_ip=$runnerIp" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          az keyvault update `
            --name $env:KEY_VAULT_NAME `
            --resource-group $env:RESOURCE_GROUP `
            --public-network-access Enabled `
            --default-action Deny `
            --output none
          az keyvault network-rule add `
            --name $env:KEY_VAULT_NAME `
            --resource-group $env:RESOURCE_GROUP `
            --ip-address "$runnerIp/32" `
            --output none
          Write-Host "Key Vault $($env:KEY_VAULT_NAME) firewall now allows $runnerIp/32"

      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchangepowershell/connect-ippssession
      # Reference: https://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles#key-vault-certificate-user
      # Reference: docs/adr/0025-role-group-entra-backing-naming.md
      - name: Deploy purview role groups
        shell: pwsh
        env:
          PRUNE_ROLE_GROUPS: ${{ inputs.prune_role_groups }}
        run: |
          if ($env:PRUNE_ROLE_GROUPS -eq 'true') {
            ./scripts/Deploy-PurviewRoleGroups.ps1 -PruneMissing -Confirm:$false
          } else {
            ./scripts/Deploy-PurviewRoleGroups.ps1 -Confirm:$false
          }

      # Reconciles Microsoft Purview sensitivity labels declared in
      # data-plane/information-protection/labels.yaml using the same
      # Security & Compliance PowerShell + Key Vault cert pattern as the
      # role-groups step above. Sits inside the shared kv-open / kv-close
      # window so the Key Vault firewall opens and closes exactly once per
      # dispatch. When the plan_labels_only dispatch input is true the step
      # runs -WhatIf and makes no Set-Label calls; when false it executes
      # the full reconciler. The script supports ShouldProcess and is
      # idempotent.
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/set-label
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchangepowershell/connect-ippssession
      # Reference: data-plane/information-protection/labels.schema.json
      - name: Deploy sensitivity labels
        shell: pwsh
        env:
          PLAN_LABELS_ONLY: ${{ inputs.plan_labels_only }}
        run: |
          if ($env:PLAN_LABELS_ONLY -eq 'true') {
            ./scripts/Deploy-Labels.ps1 -WhatIf
          } else {
            ./scripts/Deploy-Labels.ps1
          }

      # Reconciles Microsoft Purview Data Loss Prevention policies + rules
      # declared in data-plane/dlp/policies.yaml using the same Security &
      # Compliance PowerShell + Key Vault cert pattern as the labels step
      # above. Sits inside the shared kv-open / kv-close window so the Key
      # Vault firewall opens and closes exactly once per dispatch. The
      # `dlp_direction_policy` dispatch input wires through the ADR 0029
      # contract (-DirectionPolicy + -SkipNames) shipped in PR #557; the
      # apply path is unblocked by PR #566 (#564 fix for the
      # Set-DlpCompliancePolicy splat).
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/set-dlpcompliancepolicy
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/new-dlpcompliancerule
      # Reference: https://learn.microsoft.com/en-us/purview/dlp-learn-about-dlp
      # Reference: data-plane/dlp/policies.schema.json
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      # Reference: docs/runbooks/dlp-end-to-end-smoke.md
      - name: Deploy DLP policies
        shell: pwsh
        env:
          DLP_DIRECTION_POLICY: ${{ inputs.dlp_direction_policy }}
          SKIP_NAMES_DLP: ${{ inputs.skip_names_dlp }}
        run: |
          $policy = if ([string]::IsNullOrEmpty($env:DLP_DIRECTION_POLICY)) { 'portal-wins' } else { $env:DLP_DIRECTION_POLICY }
          $skipNames = @()
          if (-not [string]::IsNullOrWhiteSpace($env:SKIP_NAMES_DLP)) {
            $skipNames = @($env:SKIP_NAMES_DLP -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          }
          $applyArgs = @{
            DirectionPolicy   = $policy
            Confirm           = $false
            InformationAction = 'Continue'
          }
          if ($skipNames.Count -gt 0) {
            $applyArgs['SkipNames'] = $skipNames
            Write-Host "-SkipNames count = $($skipNames.Count): $($skipNames -join ', ')"
          }
          if ($policy -eq 'repo-wins') {
            Write-Host '::warning::repo-wins: DLP tenant fields will be OVERWRITTEN with YAML values for shared-policy / shared-rule drift. Each overwrite emits a Write-Warning naming the field set. See ADR 0029.'
          }
          Write-Host "Applying with -DirectionPolicy $policy"
          ./scripts/Deploy-DLPPolicies.ps1 @applyArgs

      # Reconciles Microsoft 365 unified audit log retention policies
      # declared in data-plane/audit/retention-policies.yaml using the same
      # Security & Compliance PowerShell + Key Vault cert pattern as the
      # DLP step above. Sits inside the shared kv-open / kv-close window
      # so the Key Vault firewall opens and closes exactly once per
      # dispatch. The reconciler is idempotent (Create / Update / NoChange
      # / Orphan). Current desired state is `policies: []` (built-in
      # 180-day tenant retention applies); the step remains a no-op until
      # a policy declaration is added.
      # Reference: https://learn.microsoft.com/en-us/purview/audit-log-retention-policies
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/new-unifiedauditlogretentionpolicy
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/get-unifiedauditlogretentionpolicy
      # Reference: data-plane/audit/retention-policies.schema.json
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      - name: Set audit retention policies
