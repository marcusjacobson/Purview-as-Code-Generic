          }
          if ($policy -eq 'repo-wins') {
            Write-Host '::warning::repo-wins: IRM entity list tenant fields will be OVERWRITTEN with YAML values for shared-entity-list drift. Each overwrite emits a Write-Warning naming the field set. See ADR 0029.'
          }
          Write-Host "Applying with -DirectionPolicy $policy"
          ./scripts/Deploy-IRMEntityLists.ps1 @applyArgs

      # Re-lock Key Vault firewall regardless of the role-groups step
      # outcome: remove the runner /32 rule and restore PNA Disabled.
      # Reference: https://learn.microsoft.com/en-us/cli/azure/keyvault/network-rule#az-keyvault-network-rule-remove
      # Reference: https://docs.github.com/en/actions/learn-github-actions/expressions#always
      - name: Close Key Vault firewall
        id: kv-close
        if: always() && steps.kv-open.outputs.runner_ip != ''
        shell: pwsh
        env:
          RUNNER_IP: ${{ steps.kv-open.outputs.runner_ip }}
        run: |
          $ErrorActionPreference = 'Continue'
          az keyvault network-rule remove `
            --name $env:KEY_VAULT_NAME `
            --resource-group $env:RESOURCE_GROUP `
            --ip-address "$($env:RUNNER_IP)/32" `
            --output none
          az keyvault update `
            --name $env:KEY_VAULT_NAME `
            --resource-group $env:RESOURCE_GROUP `
            --public-network-access Disabled `
            --output none
          Write-Host "Key Vault $($env:KEY_VAULT_NAME) reverted: PNA Disabled, $($env:RUNNER_IP)/32 rule removed"

      - name: Deploy collections
