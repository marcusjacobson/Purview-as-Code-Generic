      # Reconciles Microsoft Purview Records Management retention
      # labels and file plan property objects declared in
      # data-plane/records/file-plan.yaml using the same Security &
      # Compliance PowerShell + Key Vault cert pattern as the steps
      # above. Sits inside the shared kv-open / kv-close window. The
      # reconciler is idempotent (Create / Update / NoChange /
      # DriftWarn / Orphan / Skipped). File plan property objects
      # have no Set-* cmdlet, so drift on existing properties
      # surfaces as DriftWarn rather than Update.
      # The `records_direction_policy` dispatch input wires through
      # the ADR 0029 contract (-DirectionPolicy + -SkipNames) shipped
      # in PR #588 (#584). The `skip_names_records` default carries
      # the 29 unique names that cover the 31 Microsoft File Plan
      # Manager seed property objects ratified as immovable in ADR
      # 0035 (PR #587), so every dispatch defaults to noise-free
      # output. Current desired state is empty
      # (filePlanProperties: <all []>, retentionLabels: []); the step
      # remains a Skipped-only no-op until operator-authored labels
      # or properties are declared.
      # Reference: https://learn.microsoft.com/en-us/purview/records-management
      # Reference: https://learn.microsoft.com/en-us/purview/file-plan-manager
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/new-compliancetag
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/new-fileplanpropertyauthority
      # Reference: data-plane/records/file-plan.schema.json
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      # Reference: docs/adr/0035-records-seed-content-immovable.md
      # Reference: docs/runbooks/records-end-to-end-smoke.md
      - name: Deploy file plan
        shell: pwsh
        env:
          RECORDS_DIRECTION_POLICY: ${{ inputs.records_direction_policy }}
          SKIP_NAMES_RECORDS: ${{ inputs.skip_names_records }}
        run: |
          $policy = if ([string]::IsNullOrEmpty($env:RECORDS_DIRECTION_POLICY)) { 'portal-wins' } else { $env:RECORDS_DIRECTION_POLICY }
          $skipNames = @()
          if (-not [string]::IsNullOrWhiteSpace($env:SKIP_NAMES_RECORDS)) {
            $skipNames = @($env:SKIP_NAMES_RECORDS -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          }
          $applyArgs = @{
            DirectionPolicy   = $policy
            Confirm           = $false
            InformationAction = 'Continue'
          }
          if ($skipNames.Count -gt 0) {
            $applyArgs['SkipNames'] = $skipNames
            Write-Host "-SkipNames count = $($skipNames.Count) (Microsoft File Plan Manager seed baseline + any operator additions)"
          }
          if ($policy -eq 'repo-wins') {
            Write-Host '::warning::repo-wins: Records Management label tenant fields will be OVERWRITTEN with YAML values for shared-label drift. Each overwrite emits a Write-Warning naming the field set. See ADR 0029.'
          }
          Write-Host "Applying with -DirectionPolicy $policy"
          ./scripts/Deploy-FilePlan.ps1 @applyArgs

      # Reconciles Microsoft Purview Insider Risk Management policies
      # declared in data-plane/irm/policies.yaml using the same
      # Security & Compliance PowerShell + Key Vault cert pattern as
      # the steps above. Sits inside the shared kv-open / kv-close
      # window. The reconciler is idempotent (Create / Update /
      # NoChange / Orphan / Skipped). The `irm_direction_policy`
      # dispatch input wires through the ADR 0029 contract
      # (-DirectionPolicy + -SkipNames) shipped under #603. The
      # `skip_names_irm` default carries the 4 operator-authored
      # `IRM Lab — *` names ratified as permanent skip in
      # docs/adr/0036-irm-tenant-setting-immovable.md (the #603 hard-rule
      # mid-testing policies; the system-managed tenant-setting policy is
      # handled by the reconciler's `IRM_Tenant_Setting_*` name-prefix
      # wildcard, not the baseline), so every dispatch defaults to
      # noise-free output. Current desired
      # state is empty (policies: []); the step remains a Skipped-only
      # no-op until the operator-authored testing window closes and
      # follow-up #604 adopts the four `IRM Lab — *` policies.
      # Reference: https://learn.microsoft.com/en-us/purview/insider-risk-management
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/get-insiderriskpolicy
      # Reference: https://learn.microsoft.com/en-us/powershell/module/exchange/new-insiderriskpolicy
      # Reference: data-plane/irm/policies.schema.json
      # Reference: docs/adr/0029-source-of-truth-direction-policy.md
      # Reference: docs/adr/0036-irm-tenant-setting-immovable.md
      # Reference: docs/runbooks/irm-end-to-end-smoke.md
      - name: Deploy IRM policies
        shell: pwsh
        env:
          IRM_DIRECTION_POLICY: ${{ inputs.irm_direction_policy }}
          SKIP_NAMES_IRM: ${{ inputs.skip_names_irm }}
        run: |
          $policy = if ([string]::IsNullOrEmpty($env:IRM_DIRECTION_POLICY)) { 'portal-wins' } else { $env:IRM_DIRECTION_POLICY }
          $skipNames = @()
          if (-not [string]::IsNullOrWhiteSpace($env:SKIP_NAMES_IRM)) {
            $skipNames = @($env:SKIP_NAMES_IRM -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          }
          $applyArgs = @{
            DirectionPolicy   = $policy
            Confirm           = $false
            InformationAction = 'Continue'
          }
          if ($skipNames.Count -gt 0) {
            $applyArgs['SkipNames'] = $skipNames
            Write-Host "-SkipNames count = $($skipNames.Count) (ADR 0036 baseline + any operator additions)"
          }
          if ($policy -eq 'repo-wins') {
            Write-Host '::warning::repo-wins: IRM policy tenant fields will be OVERWRITTEN with YAML values for shared-policy drift. Each overwrite emits a Write-Warning naming the field set. See ADR 0029.'
          }
          Write-Host "Applying with -DirectionPolicy $policy"
          ./scripts/Deploy-IRMPolicies.ps1 @applyArgs

      # Reconciles Microsoft Purview Insider Risk Management entity lists
      # declared in data-plane/irm/entity-lists.yaml using the same
      # Security & Compliance PowerShell + Key Vault cert pattern as the
      # IRM policies step above. Sits inside the shared kv-open / kv-close
