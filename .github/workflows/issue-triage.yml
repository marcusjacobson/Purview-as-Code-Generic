name: Issue Triage — Squad Routing

# Intentionally NOT gated to actor.login. Routing labels (`squad:*`) are
# useful triage signal for issues filed by any actor; the labels do not
# imply owner-readiness for merge (that is `needs-review`, applied only
# to lab-owner-filed issues by `idea-intake-autoadd.yml`).

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  route-to-squad:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure squad labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "squad:lead-architect" --color "0075ca" \
            --description "Routed to Lead Architect persona" \
            --repo "${{ github.repository }}" || true
          gh label create "squad:security-specialist" --color "e4e669" \
            --description "Routed to Security Specialist persona" \
            --repo "${{ github.repository }}" || true
          gh label create "squad:automation-engineer" --color "0052cc" \
            --description "Routed to Automation Engineer persona" \
            --repo "${{ github.repository }}" || true
          gh label create "squad:tester-validator" --color "5319e7" \
            --description "Routed to Tester/Validator persona" \
            --repo "${{ github.repository }}" || true
          gh label create "squad:scribe" --color "bfd4f2" \
            --description "Routed to Scribe persona" \
            --repo "${{ github.repository }}" || true

      - name: Route issue to squad persona
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"

          # Preferred path (fix #117): the issue body's own ## Squad Personas section
          # (written by @idea-intake) already names the exact squad:* labels, embedded
          # as backtick-quoted tokens, e.g.:
          #   **Primary:** Automation Engineer (`squad:automation-engineer`)
          #   **Supporting:** Tester / Validator (`squad:tester-validator`)
          # Extract the section — everything between that heading and the next ## heading,
          # or end of body — and pull every `squad:*` token out of it. If at least one is
          # found, apply EXACTLY those labels and skip the keyword-grep fallback below
          # entirely: that is what stops the keyword-grep from re-adding labels the Squad
          # Personas section deliberately left out (the label-saturation defect this fixes).
          SQUAD_SECTION=$(printf '%s\n' "$ISSUE_BODY" | awk '/^## Squad Personas/{flag=1; next} /^## /{flag=0} flag')
          # The backticks in this pattern are the literal Markdown code-span delimiters
          # GitHub renders around a label token (e.g. "`squad:automation-engineer`"), not
          # command substitution -- they must stay inside single quotes so grep matches
          # them as literal data. shellcheck's SC2016 flags any backtick inside single
          # quotes as a possible unintended-expansion mistake; it is not one here.
          # shellcheck disable=SC2016
          SQUAD_LABELS=$(printf '%s\n' "$SQUAD_SECTION" | grep -oE '`squad:[a-z-]+`' | tr -d '`' | sort -u || true)

          if [ -n "$SQUAD_LABELS" ]; then
            LABEL_CSV=$(echo "$SQUAD_LABELS" | paste -sd, -)
            echo "Routing via ## Squad Personas section: $LABEL_CSV"
            gh issue edit "$ISSUE_NUMBER" --add-label "$LABEL_CSV" --repo "$REPO"
            exit 0
          fi

          # Fallback: no ## Squad Personas section (or no squad:* token inside it) — e.g.
          # an issue filed directly via `gh issue create` rather than through @idea-intake.
          # Preserve the original keyword-grep routing unchanged so manually-filed issues
          # keep getting triage signal.
          echo "No ## Squad Personas section found (or no squad:* token in it); falling back to keyword routing."

          COMBINED="${ISSUE_TITLE} ${ISSUE_BODY}"
          COMBINED_LOWER=$(echo "$COMBINED" | tr '[:upper:]' '[:lower:]')

          # Note: Keyword routing is intentionally additive — an issue may receive multiple squad
          # labels when it spans domains. This fallback only runs when the issue body has no
          # ## Squad Personas section (or the section carries no squad:* token); see above.

          # Lead / Architect: architecture, ADRs, framework decisions, roadmap
          if echo "$COMBINED_LOWER" | grep -qE \
            'architecture|adr|decision record|roadmap|framework|cross-workstream|governance framework|tiebreaker|design pattern'; then
            gh issue edit "$ISSUE_NUMBER" --add-label "squad:lead-architect" --repo "$REPO"
          fi

          # Security Specialist: security, compliance, policy, DLP, sensitivity labels, IRM, retention
          if echo "$COMBINED_LOWER" | grep -qE \
            'security|compliance|policy|dlp|data loss prevention|sensitivity label|insider risk|retention|audit log|dspm|role-gating|access control|conditional access|entra|identity protection'; then
            gh issue edit "$ISSUE_NUMBER" --add-label "squad:security-specialist" --repo "$REPO"
          fi

          # Automation Engineer: scripts, PowerShell, Graph or Purview REST, automation, scheduling, data sources, scans, classifications
          if echo "$COMBINED_LOWER" | grep -qE \
            'script|powershell|graph api|purview rest|automation|schedule|reporting|pipeline|bulk|cmdlet|deploy script|data source|scan|classification|catalog|onboard|reconciler'; then
            gh issue edit "$ISSUE_NUMBER" --add-label "squad:automation-engineer" --repo "$REPO"
          fi

          # Tester / Validator: testing, validation, UAT, QA, lab smoke, acceptance, exit criteria
          if echo "$COMBINED_LOWER" | grep -qE \
            'test|validation|uat|qa|quality assurance|acceptance criteria|exit criteria|verify|checklist|scenario|simulation|whatif|what-if'; then
            gh issue edit "$ISSUE_NUMBER" --add-label "squad:tester-validator" --repo "$REPO"
          fi

          # Scribe: documentation, decisions, memory, context, runbook, notes
          if echo "$COMBINED_LOWER" | grep -qE \
            'document|notes|minutes|decisions|memory|context|scribe|runbook|guide|summary|write up|record'; then
            gh issue edit "$ISSUE_NUMBER" --add-label "squad:scribe" --repo "$REPO"
          fi
