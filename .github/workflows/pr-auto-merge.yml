name: PR Auto-Merge on Owner Approval

on:
  pull_request:
    types: [labeled]

# A top-level `permissions:` block is exhaustive: any scope not listed here is set to `none`,
# so the two scopes below left `issues` at `none`. GitHub performs the `Closes #NN` linked-issue
# closure as the *merging identity* — here `secrets.GITHUB_TOKEN` (`gh pr merge --auto`) — which
# therefore had no permission to close the issue, and no ClosedEvent was ever raised. `issues: write`
# is the minimum scope that lets the merging identity write the linked issue's state (issue #73).
# Reference: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions
# Reference: https://docs.github.com/en/actions/concepts/security/github_token
permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'owner-approved'
    steps:
      # Owner identity is data-driven via the OWNER_APPROVAL_LOGIN repository variable
      # (Settings → Secrets and variables → Actions → Variables), so no owner login is
      # hardcoded in source. github.event.sender.login flows through env: and is referenced
      # as $ACTOR_LOGIN in the shell, keeping interpolation outside the shell-quoting
      # boundary per script-injection hardening.
      # Reference: https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/use-variables
      - name: Verify owner identity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR_LOGIN: ${{ github.event.sender.login }}
          OWNER_LOGIN: ${{ vars.OWNER_APPROVAL_LOGIN }}
        run: |
          if [ -z "$OWNER_LOGIN" ]; then
            echo "::error::Configuration error: the 'OWNER_APPROVAL_LOGIN' repository variable is not set. Set it under Settings → Secrets and variables → Actions → Variables to the lab owner's GitHub login."
            exit 1
          fi
          if [ "$ACTOR_LOGIN" != "$OWNER_LOGIN" ]; then
            echo "::error::Gate failed: 'owner-approved' label was applied by '$ACTOR_LOGIN', not the lab owner ('$OWNER_LOGIN' per the OWNER_APPROVAL_LOGIN variable)."
            exit 1
          fi

      - name: Verify sanity gates
        id: gates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          # Gate 1: PR must be open (not closed or merged)
          STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "::error::Gate failed: PR #$PR_NUMBER is not open (state: $STATE)."
            exit 1
          fi

          # Gate 2: PR must not be a draft
          IS_DRAFT=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json isDraft --jq '.isDraft')
          if [ "$IS_DRAFT" = "true" ]; then
            echo "::error::Gate failed: PR #$PR_NUMBER is a draft. Convert to ready for review before approving."
            exit 1
          fi

          # Gate 3: PR must carry needs-review label
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')
          if ! echo "$LABELS" | grep -q "needs-review"; then
            echo "::error::Gate failed: PR #$PR_NUMBER does not carry the 'needs-review' label."
            exit 1
          fi

          echo "All sanity gates passed for PR #$PR_NUMBER."

      - name: Enable auto-merge with squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --squash \
            --auto \
            --delete-branch

          echo "Auto-merge enabled for PR #$PR_NUMBER (squash + delete branch on merge)."

      - name: Post confirmation comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "<!-- pr-auto-merge:confirmation -->
          ## Auto-merge enabled

          The \`owner-approved\` label has been detected. Auto-merge has been enabled with squash strategy. This branch will be deleted after merge.

          *Triggered by the \`pr-auto-merge\` workflow.*"

      - name: Post failure comment
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "<!-- pr-auto-merge:failure -->
          ## Auto-merge failed — sanity gate failure

          The \`owner-approved\` label was applied but one or more sanity gates failed. Auto-merge was **not** enabled.

          Please check the workflow run logs for details and resolve the issue before re-applying the label.

          *Triggered by the \`pr-auto-merge\` workflow.*"
